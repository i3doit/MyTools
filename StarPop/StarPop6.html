<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消灭星星 · Logic Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        :root {
            --eye-care-bg: linear-gradient(135deg, #1e3a3a 0%, #0d1b1b 100%);
            --text-main: #f5f5f7;
            --accent: #ffcc00;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--eye-care-bg); color: var(--text-main); 
            font-family: -apple-system, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }
        .glass-panel {
            background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 18px; 
            width: 92%; max-width: 420px; margin-top: 15px; position: relative;
        }
        .game-info { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .info-card { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 14px; text-align: center; }
        .info-label { font-size: 10px; opacity: 0.4; }
        .info-value { font-size: 16px; font-weight: 700; color: var(--accent); }
        canvas { width: 100%; border-radius: 16px; touch-action: none; background: rgba(0,0,0,0.2); }
        .item-bar { display: flex; justify-content: center; gap: 20px; margin: 15px 0; }
        .item { 
            width: 52px; height: 52px; background: rgba(255,255,255,0.1); border-radius: 50%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; border: 2px solid transparent;
        }
        .item.active { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .item-count { font-size: 9px; margin-top: -2px; }
        .btn { border: none; padding: 12px; border-radius: 14px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
        .btn-primary { background: #fff; color: #000; margin-bottom: 10px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #222; padding: 30px; border-radius: 32px; text-align: center; width: 80%; }
        footer { margin-top: auto; padding: 20px; text-align: center; font-size: 11px; opacity: 0.4; line-height: 1.6; }
        #game-feedback { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; font-weight: 900; font-style: italic; opacity: 0; z-index: 100; }
        .combo-anim { animation: comboPop 0.8s ease-out forwards; }
        @keyframes comboPop { 0% { opacity: 0; transform: translate(-50%, 0%) scale(0.5); } 30% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); } 100% { opacity: 0; transform: translate(-50%, -100%) scale(1.6); } }
    </style>
</head>
<body>

    <header style="padding: 20px; text-align: center;"><h1>STAR POP</h1></header>

    <div class="glass-panel">
        <div id="game-feedback">GOOD!</div>
        <div class="game-info">
            <div class="info-card"><div class="info-label">SCORE</div><div id="score" class="info-value">0</div></div>
            <div class="info-card"><div class="info-label">TARGET</div><div id="target" class="info-value">1000</div></div>
            <div class="info-card"><div class="info-label">LEVEL</div><div id="level" class="info-value">1</div></div>
            <div class="info-card"><div class="info-label">REDO</div><div id="refresh" class="info-value">5</div></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="item-bar">
            <div class="item" id="tool-hammer" onclick="game.toggleHammer()">🔨<span class="item-count">HAMMER</span></div>
            <div class="item" onclick="game.resetBoard()">🔄<span class="item-count">SHUFFLE</span></div>
        </div>
        <button class="btn btn-primary" onclick="downloadShare()">📥 下载分享海报</button>
    </div>

    <div id="settle-modal" class="modal">
        <div class="modal-content">
            <div id="settle-title" style="font-size: 28px; color: var(--accent); margin-bottom: 10px;">STAGE CLEAR</div>
            <div id="bonus-area" style="color: #60D394; margin-bottom: 15px;"></div>
            <p id="settle-score" style="font-size: 24px; margin-bottom: 20px;">Score: 0</p>
            <button class="btn btn-primary" onclick="game.nextLevel()">NEXT STAGE</button>
        </div>
    </div>

    <footer>
        © <span id="year-box"></span> STAR POP · AUTHOR 艾兜兜儿<br>
        AI 提效 QQ 群: 857023577
    </footer>

    <script>
    const AudioEngine = {
        ctx: new (window.AudioContext || window.webkitAudioContext)(),
        play(freq, dur=0.2) {
            if (this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + dur);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + dur);
        }
    };

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            this.vx = (Math.random()-0.5)*10; this.vy = (Math.random()-0.5)*10; this.alpha = 1;
        }
        update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.03; }
        draw(ctx) { ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, 3, 3); ctx.globalAlpha = 1; }
    }

    class StarGame {
        constructor() {
            this.cvs = document.getElementById('gameCanvas');
            this.ctx = this.cvs.getContext('2d');
            this.state = JSON.parse(localStorage.getItem('star_v3')) || { level: 1, score: 0, refresh: 5, hammers: 3 };
            this.particles = [];
            this.selected = null;
            this.hammerMode = false;
            this.init();
            this.animate();
            this.bindEvents();
        }

        init(isNew = false) {
            if(isNew) this.state = { level: 1, score: 0, refresh: 5, hammers: 3 };
            this.target = Math.floor(1000 * Math.pow(1.5, this.state.level - 1));
            this.data = Array.from({length: 10}, () => Array.from({length: 10}, () => Math.floor(Math.random() * 5)));
            this.updateUI();
        }

        updateUI() {
            localStorage.setItem('star_v3', JSON.stringify(this.state));
            document.getElementById('score').innerText = this.state.score;
            document.getElementById('target').innerText = this.target;
            document.getElementById('level').innerText = this.state.level;
            document.getElementById('refresh').innerText = this.state.refresh;
        }

        animate() {
            this.ctx.clearRect(0, 0, 400, 400);
            const time = Date.now() / 200;
            for(let r=0; r<10; r++) {
                for(let c=0; c<10; c++) {
                    if(this.data[r][c] === null) continue;
                    const x = c * 40 + 4; const y = r * 40 + 4;
                    this.ctx.fillStyle = ['#FF5E5E','#FFD15C','#60D394','#55ACEE','#AA86FF'][this.data[r][c]];
                    if (this.selected?.has(`${r},${c}`)) this.ctx.globalAlpha = 0.6 + Math.sin(time)*0.3;
                    this.ctx.beginPath(); this.ctx.roundRect(x, y, 36, 36, 6); this.ctx.fill();
                    this.ctx.globalAlpha = 1;
                }
            }
            this.particles = this.particles.filter(p => p.alpha > 0);
            this.particles.forEach(p => { p.update(); p.draw(this.ctx); });
            requestAnimationFrame(() => this.animate());
        }

        handleAction(e) {
            const rect = this.cvs.getBoundingClientRect();
            const scale = 400 / rect.width;
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            const c = Math.floor((x * scale) / 40); const r = Math.floor((y * scale) / 40);

            if (!this.data[r] || this.data[r][c] === null) return;

            if (this.hammerMode) {
                this.eliminate([{r, c}]);
                this.state.hammers--; this.hammerMode = false;
                document.getElementById('tool-hammer').classList.remove('active');
                return;
            }

            const conn = this.getConnected(r, c, this.data[r][c]);
            if (conn.size < 2) { this.selected = null; return; }

            // 预选逻辑
            if (this.selected?.has(`${r},${c}`)) {
                AudioEngine.play(261 * Math.pow(1.06, Math.min(conn.size, 15)));
                this.state.score += conn.size * conn.size * 5;
                this.eliminate(Array.from(conn).map(s => {const [pr,pc]=s.split(',').map(Number); return {r:pr,c:pc}}));
                this.selected = null;
            } else {
                this.selected = conn;
                AudioEngine.play(440, 0.05);
            }
        }

        // --- 核心优化：只刷新当前剩余星星 ---
        resetBoard() {
            if (this.state.refresh <= 0) return;
            // 1. 提取所有非空星星
            let remainingStars = [];
            for(let r=0; r<10; r++) {
                for(let c=0; c<10; c++) {
                    if(this.data[r][c] !== null) remainingStars.push(this.data[r][c]);
                }
            }
            if (remainingStars.length === 0) return;
            // 2. 随机打乱
            remainingStars.sort(() => Math.random() - 0.5);
            // 3. 重新填入（从底部向上填）
            this.data = Array.from({length: 10}, () => Array.from({length: 10}, () => null));
            let idx = 0;
            for (let c = 0; c < 10; c++) {
                for (let r = 9; r >= 0; r--) {
                    if (idx < remainingStars.length) {
                        this.data[r][c] = remainingStars[idx++];
                    }
                }
            }
            this.state.refresh--;
            this.updateUI();
            AudioEngine.play(300, 0.1);
        }

        eliminate(coords) {
            coords.forEach(pos => {
                const color = ['#FF5E5E','#FFD15C','#60D394','#55ACEE','#AA86FF'][this.data[pos.r][pos.c]];
                for(let i=0; i<6; i++) this.particles.push(new Particle(pos.c*40+20, pos.r*40+20, color));
                this.data[pos.r][pos.c] = null;
            });
            this.applyGravity(); this.updateUI(); this.checkStatus();
        }

        getConnected(r, c, color, set = new Set()) {
            if (r<0 || r>=10 || c<0 || c>=10 || this.data[r][c] !== color || set.has(`${r},${c}`)) return set;
            set.add(`${r},${c}`);
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dr, dc]) => this.getConnected(r+dr, c+dc, color, set));
            return set;
        }

        applyGravity() {
            for (let c = 0; c < 10; c++) {
                let emptyRow = 9;
                for (let r = 9; r >= 0; r--) {
                    if (this.data[r][c] !== null) {
                        [this.data[emptyRow][c], this.data[r][c]] = [this.data[r][c], this.data[emptyRow][c]];
                        emptyRow--;
                    }
                }
            }
            let emptyCol = 0;
            for (let c = 0; c < 10; c++) {
                if (this.data.some(row => row[c] !== null)) {
                    if (emptyCol !== c) {
                        for(let r=0; r<10; r++) { this.data[r][emptyCol] = this.data[r][c]; this.data[r][c] = null; }
                    }
                    emptyCol++;
                }
            }
        }

        checkStatus() {
            const hasMove = this.data.some((row, r) => row.some((col, c) => col !== null && this.getConnected(r, c, col).size > 1));
            if (!hasMove) {
                const remains = this.data.flat().filter(v => v !== null).length;
                let bonus = remains < 10 ? (2000 - remains * 200) : 0;
                this.state.score += bonus;
                document.getElementById('bonus-area').innerText = bonus > 0 ? `Bonus: +${bonus}` : "No Bonus";
                setTimeout(() => {
                    const modal = document.getElementById('settle-modal');
                    modal.style.display = 'flex';
                    document.getElementById('settle-score').innerText = `Score: ${this.state.score}`;
                    if (this.state.score < this.target) {
                        document.getElementById('settle-title').innerText = "GAME OVER";
                        this.state.level = 0;
                    }
                }, 800);
            }
        }

        nextLevel() {
            document.getElementById('settle-modal').style.display = 'none';
            if(this.state.level === 0) this.init(true);
            else { this.state.level++; this.state.score = 0; this.init(); }
        }

        toggleHammer() { this.hammerMode = !this.hammerMode; document.getElementById('tool-hammer').classList.toggle('active'); }
        bindEvents() {
            this.cvs.addEventListener('touchstart', (e) => { e.preventDefault(); this.handleAction(e); }, {passive: false});
            this.cvs.addEventListener('mousedown', (e) => this.handleAction(e));
        }
    }

    const game = new StarGame();
    document.getElementById('year-box').innerText = new Date().getFullYear();

    async function downloadShare() {
        const hCvs = document.createElement('canvas'); hCvs.width = 600; hCvs.height = 850;
        const hCtx = hCvs.getContext('2d');
        hCtx.fillStyle = '#FFFFFF'; hCtx.fillRect(0,0,600,850);
        hCtx.textAlign = 'left'; hCtx.fillStyle = '#2c3e50'; hCtx.font = 'italic bold 48px sans-serif';
        hCtx.fillText('Star Pop Pro', 50, 90);
        hCtx.fillStyle = '#4CAF50'; hCtx.font = 'bold 24px sans-serif'; hCtx.fillText('至臻消灭星星', 50, 130);
        hCtx.textAlign = 'right'; hCtx.fillStyle = '#95a5a6'; hCtx.font = '18px sans-serif';
        hCtx.fillText('AUTHOR', 550, 70); hCtx.fillText('艾兜兜儿', 550, 105);
        const qrDataUrl = await QRCode.toDataURL(window.location.href, { width: 360 });
        const img = new Image(); img.src = qrDataUrl;
        img.onload = () => {
            hCtx.drawImage(img, 120, 240, 360, 360);
            hCtx.textAlign = 'center'; hCtx.fillStyle = '#2c3e50'; hCtx.font = 'bold 32px sans-serif';
            hCtx.fillText('扫码立即开始', 300, 710);
            const link = document.createElement('a'); link.download = 'StarPop.png'; link.href = hCvs.toDataURL(); link.click();
        };
    }
    </script>
</body>
</html>
