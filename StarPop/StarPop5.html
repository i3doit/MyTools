<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消灭星星 · Logic Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --eye-care-bg: linear-gradient(135deg, #1e3a3a 0%, #0d1b1b 100%);
            --text-main: #f5f5f7;
            --accent: #ffcc00;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--eye-care-bg); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }

        header { padding: 25px 20px 10px; text-align: center; animation: fadeIn 1s; }
        header h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
        header p { font-size: 12px; opacity: 0.5; margin-top: 4px; }

        .glass-panel {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; padding: 18px; 
            width: 92%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); position: relative;
        }

        /* 游戏看板 */
        .game-info { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .info-card { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 14px; text-align: center; }
        .info-label { font-size: 10px; opacity: 0.4; text-transform: uppercase; margin-bottom: 2px; }
        .info-value { font-size: 16px; font-weight: 700; color: var(--accent); }

        canvas { width: 100%; border-radius: 16px; touch-action: none; background: rgba(0,0,0,0.2); cursor: pointer; }

        /* 底部工具栏 */
        .item-bar { display: flex; justify-content: center; gap: 20px; margin: 15px 0; }
        .item { 
            width: 52px; height: 52px; background: rgba(255,255,255,0.1); border-radius: 50%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }
        .item:active { transform: scale(0.9); }
        .item.active { border-color: var(--accent); background: rgba(255,204,0,0.2); box-shadow: 0 0 15px var(--accent); }
        .item-count { font-size: 9px; margin-top: -2px; font-weight: bold; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { border: none; padding: 12px; border-radius: 14px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #fff; color: #000; }
        .btn-secondary { background: rgba(255,255,255,0.15); color: #fff; }

        /* 结算与提示 */
        #game-feedback {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 100; font-weight: 900; font-style: italic; opacity: 0;
        }
        .combo-anim { animation: comboPop 0.8s ease-out forwards; }
        @keyframes comboPop {
            0% { opacity: 0; transform: translate(-50%, 0%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(1.6); }
        }

        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000;
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .modal-content { 
            background: rgba(40, 40, 40, 0.9); border: 1px solid rgba(255,255,255,0.1);
            padding: 40px 30px; border-radius: 32px; text-align: center; width: 85%; max-width: 340px;
        }
        .modal-title { font-size: 32px; font-weight: 800; color: var(--accent); margin-bottom: 10px; }

        footer { margin-top: auto; padding: 25px; text-align: center; font-size: 11px; color: rgba(255,255,255,0.3); line-height: 1.8; }
        .qq-box { color: #409eff; font-weight: bold; cursor: pointer; }
        a { color: inherit; text-decoration: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <h1>STAR POP</h1>
        <p>REFINED EDITION · 精品消除</p>
    </header>

    <div class="glass-panel">
        <div id="game-feedback">GOOD!</div>
        
        <div class="game-info">
            <div class="info-card"><div class="info-label">SCORE</div><div id="score" class="info-value">0</div></div>
            <div class="info-card"><div class="info-label">TARGET</div><div id="target" class="info-value">1000</div></div>
            <div class="info-card"><div class="info-label">LEVEL</div><div id="level" class="info-value">1</div></div>
            <div class="info-card"><div class="info-label">REDO</div><div id="refresh" class="info-value">5</div></div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="item-bar">
            <div class="item" id="tool-hammer" onclick="game.toggleHammer()">
                🔨<span class="item-count">HAMMER(3)</span>
            </div>
            <div class="item" onclick="game.resetBoard()">
                🔄<span class="item-count">REFRESH</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="downloadShare()">📥 下载分享海报</button>
            <button class="btn btn-secondary" onclick="copyURL()">🔗 复制链接</button>
        </div>
    </div>

    <div id="settle-modal" class="modal">
        <div class="modal-content">
            <div class="modal-title" id="settle-title">STAGE CLEAR</div>
            <div id="bonus-area" style="margin: 15px 0; font-size: 14px; color: #60D394;"></div>
            <p id="settle-score" style="font-size: 24px; margin-bottom: 25px; font-weight: 700;">Score: 0</p>
            <button class="btn btn-primary" style="width: 100%; height: 50px;" onclick="game.nextLevel()">NEXT STAGE</button>
        </div>
    </div>

    <footer>
        © <span id="year-box"></span> STAR POP · ALL RIGHTS RESERVED<br>
        AI 提效工具官方 QQ 群: <span class="qq-box" onclick="copyQQ('857023577')">857023577</span><br>
        <a href="https://t.zsxq.com/7tSuP">技术支持: 艾兜兜儿</a> | <a href="https://mp.weixin.qq.com/s/uHh9gx2sUMOOjIhKyIbx4A">更多工具</a>
    </footer>

    <script>
    // --- 音效引擎 ---
    const AudioEngine = {
        ctx: new (window.AudioContext || window.webkitAudioContext)(),
        playNote(freq, type = 'sine', duration = 0.2) {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        },
        playEliminate(count) {
            // 阶梯音阶：消除越多音调越高
            const baseFreq = 261.63; // Do
            const step = Math.min(count, 15);
            this.playNote(baseFreq * Math.pow(1.06, step), 'triangle');
        },
        playBonus() { this.playNote(523.25, 'square', 0.1); }
    };

    // --- 粒子引擎 ---
    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            this.vx = (Math.random() - 0.5) * 12;
            this.vy = (Math.random() - 0.5) * 12;
            this.alpha = 1;
        }
        update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.025; }
        draw(ctx) {
            ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, 3, 3); ctx.globalAlpha = 1;
        }
    }

    // --- 游戏逻辑 ---
    const CONFIG = {
        rows: 10, cols: 10, size: 36, gap: 4,
        colors: ['#FF5E5E', '#FFD15C', '#60D394', '#55ACEE', '#AA86FF']
    };

    class StarGame {
        constructor() {
            this.cvs = document.getElementById('gameCanvas');
            this.ctx = this.cvs.getContext('2d');
            this.state = JSON.parse(localStorage.getItem('star_pro_v2')) || { level: 1, score: 0, refresh: 5, hammers: 3 };
            this.particles = [];
            this.selected = null; // 预选中
            this.hammerMode = false;
            this.init();
            this.animate();
            this.bindEvents();
        }

        init(isNew = false) {
            if(isNew) this.state = { level: 1, score: 0, refresh: 5, hammers: 3 };
            this.target = Math.floor(1000 * Math.pow(1.5, this.state.level - 1));
            this.data = Array.from({length: CONFIG.rows}, () => Array.from({length: CONFIG.cols}, () => Math.floor(Math.random() * 5)));
            this.selected = null;
            this.updateUI();
        }

        updateUI() {
            localStorage.setItem('star_pro_v2', JSON.stringify(this.state));
            document.getElementById('score').innerText = this.state.score;
            document.getElementById('target').innerText = this.target;
            document.getElementById('level').innerText = this.state.level;
            document.getElementById('refresh').innerText = this.state.refresh;
            document.querySelector('#tool-hammer .item-count').innerText = `HAMMER(${this.state.hammers})`;
        }

        toggleHammer() {
            if(this.state.hammers <= 0) return;
            this.hammerMode = !this.hammerMode;
            document.getElementById('tool-hammer').classList.toggle('active', this.hammerMode);
        }

        animate() {
            this.ctx.clearRect(0, 0, 400, 400);
            const time = Date.now() / 200;

            for(let r=0; r<CONFIG.rows; r++) {
                for(let c=0; c<CONFIG.cols; c++) {
                    if(this.data[r][c] === null) continue;
                    const x = c * (CONFIG.size + CONFIG.gap) + CONFIG.gap;
                    const y = r * (CONFIG.size + CONFIG.gap) + CONFIG.gap;
                    
                    this.ctx.fillStyle = CONFIG.colors[this.data[r][c]];
                    
                    // 预选中闪烁效果
                    if (this.selected && this.selected.has(`${r},${c}`)) {
                        this.ctx.globalAlpha = 0.6 + Math.sin(time) * 0.3;
                    } else {
                        this.ctx.globalAlpha = 1;
                    }

                    this.ctx.beginPath();
                    this.ctx.roundRect(x, y, CONFIG.size, CONFIG.size, 6);
                    this.ctx.fill();
                    this.ctx.globalAlpha = 1;
                }
            }
            this.particles = this.particles.filter(p => p.alpha > 0);
            this.particles.forEach(p => { p.update(); p.draw(this.ctx); });
            requestAnimationFrame(() => this.animate());
        }

        handleAction(e) {
            const rect = this.cvs.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const scale = 400 / rect.width;
            const c = Math.floor(((clientX - rect.left) * scale) / (CONFIG.size + CONFIG.gap));
            const r = Math.floor(((clientY - rect.top) * scale) / (CONFIG.size + CONFIG.gap));

            if (!this.data[r] || this.data[r][c] === null) return;

            // 道具模式
            if (this.hammerMode) {
                this.eliminate([{r, c}]);
                this.state.hammers--;
                this.hammerMode = false;
                document.getElementById('tool-hammer').classList.remove('active');
                AudioEngine.playNote(800, 'sine');
                return;
            }

            const conn = this.getConnected(r, c, this.data[r][c]);
            if (conn.size < 2) { this.selected = null; return; }

            // 核心：双击确认（预选逻辑）
            if (this.selected && this.selected.has(`${r},${c}`)) {
                this.executeEliminate(conn);
                this.selected = null;
            } else {
                this.selected = conn;
                AudioEngine.playNote(440, 'sine', 0.05); // 选中音效
            }
        }

        executeEliminate(conn) {
            AudioEngine.playEliminate(conn.size);
            this.showFeedback(conn.size);
            this.state.score += conn.size * conn.size * 5;
            
            const coords = Array.from(conn).map(s => {
                const [pr, pc] = s.split(',').map(Number);
                return {r: pr, c: pc};
            });
            this.eliminate(coords);
        }

        eliminate(coords) {
            coords.forEach(pos => {
                const color = CONFIG.colors[this.data[pos.r][pos.c]];
                const centerX = pos.c * (CONFIG.size + CONFIG.gap) + CONFIG.size/2;
                const centerY = pos.r * (CONFIG.size + CONFIG.gap) + CONFIG.size/2;
                for(let i=0; i<6; i++) this.particles.push(new Particle(centerX, centerY, color));
                this.data[pos.r][pos.c] = null;
            });
            this.applyGravity();
            this.updateUI();
            this.checkStatus();
        }

        getConnected(r, c, color, set = new Set()) {
            if (r<0 || r>=CONFIG.rows || c<0 || c>=CONFIG.cols || this.data[r][c] !== color || set.has(`${r},${c}`)) return set;
            set.add(`${r},${c}`);
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dr, dc]) => this.getConnected(r+dr, c+dc, color, set));
            return set;
        }

        applyGravity() {
            for (let c = 0; c < CONFIG.cols; c++) {
                let emptyRow = CONFIG.rows - 1;
                for (let r = CONFIG.rows - 1; r >= 0; r--) {
                    if (this.data[r][c] !== null) {
                        [this.data[emptyRow][c], this.data[r][c]] = [this.data[r][c], this.data[emptyRow][c]];
                        emptyRow--;
                    }
                }
            }
            let emptyCol = 0;
            for (let c = 0; c < CONFIG.cols; c++) {
                if (this.data.some(row => row[c] !== null)) {
                    if (emptyCol !== c) {
                        this.data.forEach(row => { row[emptyCol] = row[c]; row[c] = null; });
                    }
                    emptyCol++;
                }
            }
        }

        showFeedback(count) {
            const el = document.getElementById('game-feedback');
            const texts = ["GOOD!", "EXCELLENT!", "AMAZING!", "UNBELIEVABLE!"];
            el.innerText = texts[Math.min(Math.floor(count/5), 3)];
            el.classList.remove('combo-anim');
            void el.offsetWidth;
            el.classList.add('combo-anim');
        }

        async checkStatus() {
            const hasMove = this.data.some((row, r) => row.some((col, c) => col !== null && this.getConnected(r, c, col).size > 1));
            if (!hasMove) {
                // 关卡末尾清盘逻辑
                const remains = this.data.flat().filter(v => v !== null).length;
                let bonus = 0;
                if (remains < 10) {
                    bonus = 2000 - remains * 200;
                    document.getElementById('bonus-area').innerText = `清盘奖励: +${bonus} (剩余${remains}颗)`;
                } else {
                    document.getElementById('bonus-area').innerText = `剩余${remains}颗，无清盘奖励`;
                }
                
                this.state.score += bonus;
                this.updateUI();

                setTimeout(() => {
                    const modal = document.getElementById('settle-modal');
                    const title = document.getElementById('settle-title');
                    modal.style.display = 'flex';
                    if (this.state.score >= this.target) {
                        title.innerText = "STAGE CLEAR";
                        title.style.color = "#60D394";
                    } else {
                        title.innerText = "GAME OVER";
                        title.style.color = "#FF5E5E";
                        this.state.level = 0; 
                    }
                    document.getElementById('settle-score').innerText = `Score: ${this.state.score}`;
                }, 1000);
            }
        }

        nextLevel() {
            document.getElementById('settle-modal').style.display = 'none';
            if(this.state.level === 0) this.init(true);
            else { this.state.level++; this.state.score = 0; this.init(); }
        }

        resetBoard() {
            if (this.state.refresh > 0) { 
                this.state.refresh--; 
                this.data = Array.from({length: CONFIG.rows}, () => Array.from({length: CONFIG.cols}, () => Math.floor(Math.random() * 5)));
                this.updateUI();
            }
        }

        bindEvents() {
            this.cvs.addEventListener('touchstart', (e) => { e.preventDefault(); this.handleAction(e); }, {passive: false});
            this.cvs.addEventListener('mousedown', (e) => this.handleAction(e));
        }
    }

    const game = new StarGame();
    document.getElementById('year-box').innerText = new Date().getFullYear();

    // --- 通用功能 ---
    function copyURL() { navigator.clipboard.writeText(window.location.href); alert("链接已复制"); }
    function copyQQ(num) { navigator.clipboard.writeText(num); alert("群号已复制"); }

    async function downloadShare() {
        const hCvs = document.createElement('canvas'); hCvs.width = 600; hCvs.height = 850;
        const hCtx = hCvs.getContext('2d');
        
        // 背景与样式复刻
        hCtx.fillStyle = '#FFFFFF'; hCtx.fillRect(0,0,600,850);
        hCtx.textAlign = 'left'; hCtx.fillStyle = '#2c3e50'; hCtx.font = 'italic bold 48px sans-serif';
        hCtx.fillText('Star Pop Pro', 50, 90);
        hCtx.fillStyle = '#4CAF50'; hCtx.font = 'bold 24px sans-serif'; hCtx.fillText('至臻消灭星星', 50, 130);
        
        hCtx.textAlign = 'right'; hCtx.fillStyle = '#95a5a6'; hCtx.font = '18px sans-serif';
        hCtx.fillText('AUTHOR', 550, 70);
        hCtx.fillStyle = '#2c3e50'; hCtx.font = 'bold 24px sans-serif'; hCtx.fillText('艾兜兜儿', 550, 105);

        hCtx.strokeStyle = '#f0fdf4'; hCtx.lineWidth = 40; hCtx.strokeRect(100, 220, 400, 400);

        const qrDataUrl = await QRCode.toDataURL(window.location.href, { margin: 1, width: 360 });
        const img = new Image(); img.src = qrDataUrl;
        img.onload = () => {
            hCtx.drawImage(img, 120, 240, 360, 360);
            hCtx.textAlign = 'center'; hCtx.fillStyle = '#2c3e50'; hCtx.font = 'bold 32px sans-serif';
            hCtx.fillText('长按或扫码立即消除', 300, 710);
            hCtx.fillStyle = '#95a5a6'; hCtx.font = '22px sans-serif';
            hCtx.fillText('阶梯音效系统 · 确认闪烁动效', 300, 760);
            hCtx.strokeStyle = '#eee'; hCtx.beginPath(); hCtx.moveTo(50, 800); hCtx.lineTo(550, 800); hCtx.stroke();
            hCtx.fillText('联系作者微信：857023577', 300, 835);
            
            const link = document.createElement('a'); link.download = 'StarPop_Poster.png';
            link.href = hCvs.toDataURL(); link.click();
        };
    }
    </script>
</body>
