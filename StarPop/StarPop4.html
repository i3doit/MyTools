<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消灭星星 - 极简至臻版</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --eye-care-bg: linear-gradient(135deg, #1e3a3a 0%, #0d1b1b 100%);
            --text-main: #f5f5f7;
            --accent: #ffcc00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--eye-care-bg); color: var(--text-main); font-family: -apple-system, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }

        header { padding: 20px; text-align: center; }
        header h1 { font-size: 24px; font-weight: 600; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 15px; width: 92%; max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); position: relative;
        }

        /* 游戏看板 */
        .game-info { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
        .info-card { background: rgba(255,255,255,0.05); padding: 6px; border-radius: 12px; text-align: center; }
        .info-label { font-size: 10px; opacity: 0.5; }
        .info-value { font-size: 16px; font-weight: 700; color: var(--accent); }

        canvas { width: 100%; border-radius: 12px; touch-action: none; background: rgba(0,0,0,0.2); }

        /* 道具栏 */
        .item-bar { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .item { 
            width: 50px; height: 50px; background: rgba(255,255,255,0.1); border-radius: 50%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; transition: 0.3s; border: 2px solid transparent;
        }
        .item.active { border-color: var(--accent); background: rgba(255,204,0,0.2); box-shadow: 0 0 15px var(--accent); }
        .item-count { font-size: 10px; margin-top: -2px; }

        /* 按钮与页脚 */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { border: none; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: #fff; color: #000; }
        .btn-secondary { background: rgba(255,255,255,0.15); color: #fff; }

        /* 结算弹窗 */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000;
            display: none; align-items: center; justify-content: center; 
        }
        .modal-content { 
            background: rgba(255,255,255,0.1); backdrop-filter: blur(30px);
            padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2);
            text-align: center; width: 80%; max-width: 320px;
        }
        .modal-title { font-size: 28px; margin-bottom: 10px; color: var(--accent); }

        /* 反馈动画 */
        #game-feedback {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 100; font-weight: 900; opacity: 0;
        }
        .combo-anim { animation: comboPop 0.8s ease-out forwards; }
        @keyframes comboPop {
            0% { opacity: 0; transform: translate(-50%, 0%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(1.5); }
        }

        footer { margin-top: auto; padding: 20px; text-align: center; font-size: 11px; color: rgba(255,255,255,0.3); line-height: 1.6; }
        .qq-copy { color: #409eff; cursor: pointer; }
    </style>
</head>
<body>

    <header><h1>消灭星星 · 至臻版</h1></header>

    <div class="glass-panel">
        <div id="game-feedback">GOOD!</div>
        
        <div class="game-info">
            <div class="info-card"><div class="info-label">分数</div><div id="score" class="info-value">0</div></div>
            <div class="info-card"><div class="info-label">目标</div><div id="target" class="info-value">1000</div></div>
            <div class="info-card"><div class="info-label">关卡</div><div id="level" class="info-value">1</div></div>
            <div class="info-card"><div class="info-label">刷新</div><div id="refresh" class="info-value">5</div></div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="item-bar">
            <div class="item" id="tool-hammer" onclick="game.toggleHammer()">
                🔨<span class="item-count">锤子(3)</span>
            </div>
            <div class="item" onclick="game.resetBoard()">
                🔄<span class="item-count">刷新</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="copyURL()">🔗 复制分享</button>
            <button class="btn btn-secondary" onclick="downloadShare()">📥 下载二维码</button>
        </div>
    </div>

    <div id="settle-modal" class="modal">
        <div class="modal-content">
            <div class="modal-title" id="settle-title">STAGE CLEAR!</div>
            <p id="settle-score" style="font-size: 20px; margin-bottom: 20px;">得分: 0</p>
            <button class="btn btn-primary" style="width: 100%;" onclick="game.nextLevel()">下一关</button>
        </div>
    </div>

    <footer>
        © <span id="year-box"></span> Star Pop | AI 提效 QQ 群：<span class="qq-copy" onclick="copyQQ('857023577')">857023577</span><br>
        <a href="https://t.zsxq.com/7tSuP" style="color:inherit">技术支持：艾兜兜儿</a>
    </footer>

    <script>
    const CONFIG = {
        rows: 10, cols: 10, size: 36, gap: 4,
        colors: ['#FF5E5E', '#FFD15C', '#60D394', '#55ACEE', '#AA86FF']
    };

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            this.vx = (Math.random() - 0.5) * 10;
            this.vy = (Math.random() - 0.5) * 10;
            this.alpha = 1;
        }
        update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.02; }
        draw(ctx) {
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, 4, 4);
            ctx.globalAlpha = 1;
        }
    }

    class StarGame {
        constructor() {
            this.cvs = document.getElementById('gameCanvas');
            this.ctx = this.cvs.getContext('2d');
            this.state = JSON.parse(localStorage.getItem('star_pro_v1')) || { level: 1, score: 0, refresh: 5, hammers: 3 };
            this.particles = [];
            this.hammerMode = false;
            this.init();
            this.animate();
            this.bindEvents();
        }

        init(isNew = false) {
            if(isNew) this.state = { level: 1, score: 0, refresh: 5, hammers: 3 };
            this.target = Math.floor(1000 * Math.pow(1.5, this.state.level - 1));
            this.data = Array.from({length: CONFIG.rows}, () => Array.from({length: CONFIG.cols}, () => Math.floor(Math.random() * 5)));
            this.updateUI();
        }

        updateUI() {
            localStorage.setItem('star_pro_v1', JSON.stringify(this.state));
            document.getElementById('score').innerText = this.state.score;
            document.getElementById('target').innerText = this.target;
            document.getElementById('level').innerText = this.state.level;
            document.getElementById('refresh').innerText = this.state.refresh;
            document.querySelector('#tool-hammer .item-count').innerText = `锤子(${this.state.hammers})`;
        }

        toggleHammer() {
            if(this.state.hammers <= 0) return;
            this.hammerMode = !this.hammerMode;
            document.getElementById('tool-hammer').classList.toggle('active', this.hammerMode);
        }

        // 核心渲染循环
        animate() {
            this.ctx.clearRect(0, 0, 400, 400);
            // 绘方块
            for(let r=0; r<CONFIG.rows; r++) {
                for(let c=0; c<CONFIG.cols; c++) {
                    if(this.data[r][c] === null) continue;
                    const x = c * (CONFIG.size + CONFIG.gap) + CONFIG.gap;
                    const y = r * (CONFIG.size + CONFIG.gap) + CONFIG.gap;
                    this.ctx.fillStyle = CONFIG.colors[this.data[r][c]];
                    this.ctx.beginPath();
                    this.ctx.roundRect(x, y, CONFIG.size, CONFIG.size, 6);
                    this.ctx.fill();
                }
            }
            // 绘粒子
            this.particles = this.particles.filter(p => p.alpha > 0);
            this.particles.forEach(p => { p.update(); p.draw(this.ctx); });
            requestAnimationFrame(() => this.animate());
        }

        handleAction(e) {
            const rect = this.cvs.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const scale = 400 / rect.width;
            const c = Math.floor(((clientX - rect.left) * scale) / (CONFIG.size + CONFIG.gap));
            const r = Math.floor(((clientY - rect.top) * scale) / (CONFIG.size + CONFIG.gap));

            if (!this.data[r] || this.data[r][c] === null) return;

            if (this.hammerMode) {
                this.eliminate([{r, c}]);
                this.state.hammers--;
                this.hammerMode = false;
                document.getElementById('tool-hammer').classList.remove('active');
                this.updateUI();
                return;
            }

            const connected = this.getConnected(r, c, this.data[r][c]);
            if (connected.size < 2) return;

            this.showFeedback(connected.size);
            this.state.score += connected.size * connected.size * 5;
            
            const coords = Array.from(connected).map(s => {
                const [pr, pc] = s.split(',').map(Number);
                return {r: pr, c: pc};
            });
            this.eliminate(coords);
        }

        eliminate(coords) {
            coords.forEach(pos => {
                const color = CONFIG.colors[this.data[pos.r][pos.c]];
                const centerX = pos.c * (CONFIG.size + CONFIG.gap) + CONFIG.size/2;
                const centerY = pos.r * (CONFIG.size + CONFIG.gap) + CONFIG.size/2;
                // 创建粒子
                for(let i=0; i<8; i++) this.particles.push(new Particle(centerX, centerY, color));
                this.data[pos.r][pos.c] = null;
            });
            this.applyGravity();
            this.updateUI();
            this.checkStatus();
        }

        getConnected(r, c, color, set = new Set()) {
            if (r<0 || r>=CONFIG.rows || c<0 || c>=CONFIG.cols || this.data[r][c] !== color || set.has(`${r},${c}`)) return set;
            set.add(`${r},${c}`);
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dr, dc]) => this.getConnected(r+dr, c+dc, color, set));
            return set;
        }

        applyGravity() {
            for (let c = 0; c < CONFIG.cols; c++) {
                let emptyRow = CONFIG.rows - 1;
                for (let r = CONFIG.rows - 1; r >= 0; r--) {
                    if (this.data[r][c] !== null) {
                        [this.data[emptyRow][c], this.data[r][c]] = [this.data[r][c], this.data[emptyRow][c]];
                        emptyRow--;
                    }
                }
            }
            let emptyCol = 0;
            for (let c = 0; c < CONFIG.cols; c++) {
                if (this.data.some(row => row[c] !== null)) {
                    if (emptyCol !== c) {
                        this.data.forEach(row => { row[emptyCol] = row[c]; row[c] = null; });
                    }
                    emptyCol++;
                }
            }
        }

        showFeedback(count) {
            const el = document.getElementById('game-feedback');
            const texts = ["GOOD!", "EXCELLENT!", "AMAZING!", "UNBELIEVABLE!"];
            el.innerText = texts[Math.min(Math.floor(count/5), 3)];
            el.classList.remove('combo-anim');
            void el.offsetWidth;
            el.classList.add('combo-anim');
        }

        checkStatus() {
            const hasMove = this.data.some((row, r) => row.some((col, c) => col !== null && this.getConnected(r, c, col).size > 1));
            if (!hasMove) {
                const modal = document.getElementById('settle-modal');
                const title = document.getElementById('settle-title');
                const scoreDesc = document.getElementById('settle-score');
                
                modal.style.display = 'flex';
                if (this.state.score >= this.target) {
                    title.innerText = "STAGE CLEAR!";
                    scoreDesc.innerText = `得分: ${this.state.score}`;
                } else {
                    title.innerText = "GAME OVER";
                    scoreDesc.innerText = `还差 ${this.target - this.state.score} 分`;
                    this.state.level = 0; // 重置标记
                }
            }
        }

        nextLevel() {
            document.getElementById('settle-modal').style.display = 'none';
            if(this.state.level === 0) this.init(true);
            else { this.state.level++; this.state.score = 0; this.init(); }
        }

        resetBoard() {
            if (this.state.refresh > 0) { this.state.refresh--; this.init(); }
        }

        bindEvents() {
            this.cvs.addEventListener('touchstart', (e) => { e.preventDefault(); this.handleAction(e); }, {passive: false});
            this.cvs.addEventListener('mousedown', (e) => this.handleAction(e));
        }
    }

    const game = new StarGame();
    document.getElementById('year-box').innerText = new Date().getFullYear() > 2026 ? "2026-" + new Date().getFullYear() : "2026";
    function copyURL() { navigator.clipboard.writeText(window.location.href); }
    function copyQQ(num) { navigator.clipboard.writeText(num); }
    async function downloadShare() {
        const hCvs = document.createElement('canvas'); hCvs.width=300; hCvs.height=400;
        const hCtx = hCvs.getContext('2d');
        hCtx.fillStyle = '#FFFFFF'; hCtx.fillRect(0,0,300,400);
        hCtx.fillStyle = '#333'; hCtx.font = 'bold 20px sans-serif'; hCtx.textAlign = 'center';
        hCtx.fillText('消灭星星 · 至臻版', 150, 40);
        const qrDataUrl = await QRCode.toDataURL(window.location.href, { width: 200 });
        const img = new Image(); img.src = qrDataUrl;
        img.onload = () => {
            hCtx.drawImage(img, 50, 100, 200, 200);
            hCtx.fillText('作者：艾兜兜儿', 150, 330);
            const a = document.createElement('a'); a.download = 'star.png'; a.href = hCvs.toDataURL(); a.click();
        };
    }
    </script>
</body>
</html>
