<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBTI 2.0 - 灵魂探测器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; background-color: #f3f4f6; color: #1f2937; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .btn-option { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-option:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2); }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="max-w-2xl w-full glass rounded-[2rem] shadow-xl overflow-hidden p-8 md:p-12 transition-all">
        
        <div id="start-screen" class="text-center fade-in">
            <div class="inline-block px-4 py-1 rounded-full bg-indigo-100 text-indigo-600 text-sm font-bold mb-4">NEW VERSION</div>
            <h1 class="text-6xl font-black mb-6 tracking-tighter text-indigo-600">SBTI-20</h1>
            <p class="text-gray-500 mb-10 text-lg">系统已为您精选 20 道灵魂拷问。<br>请在 3 分钟内完成，不要思考，跟随你的直觉。</p>
            <button onclick="startQuiz()" class="w-full md:w-64 bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition">
                开始测评
            </button>
        </div>

        <div id="quiz-screen" class="hidden fade-in">
            <div class="flex justify-between items-center mb-8">
                <span id="q-counter" class="text-sm font-mono font-bold text-indigo-500 italic">QUESTION 01/20</span>
                <div class="w-32 h-2 bg-gray-200 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-300" style="width: 5%"></div>
                </div>
            </div>
            <h2 id="question-text" class="text-2xl md:text-3xl font-bold mb-10 leading-tight">载入中...</h2>
            <div id="options-container" class="grid gap-4">
                </div>
        </div>

        <div id="result-screen" class="hidden fade-in">
            <div class="text-center mb-8">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Testing Complete</p>
                <h3 class="text-lg text-gray-600 font-medium">你的人格类型是</h3>
                <h1 id="result-code" class="text-7xl font-black text-indigo-600 my-4 tracking-tighter italic">CODE</h1>
                <div class="inline-block px-6 py-2 bg-indigo-600 text-white rounded-full font-bold text-sm" id="main-type">
                    主类型加载中
                </div>
            </div>

            <hr class="border-gray-200 my-8">

            <section class="mb-8">
                <h4 class="font-bold text-gray-800 mb-3 flex items-center">
                    <span class="w-1.5 h-6 bg-indigo-500 rounded-full mr-2"></span>结果解析
                </h4>
                <p id="result-desc" class="text-gray-600 leading-relaxed bg-gray-50 p-6 rounded-2xl italic">
                    正在分析你的行为逻辑...
                </p>
            </section>

            <section class="mb-8">
                <h4 class="font-bold text-gray-800 mb-4 flex items-center">
                    <span class="w-1.5 h-6 bg-indigo-500 rounded-full mr-2"></span>维度评分
                </h4>
                <div id="dimension-stats" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </section>

            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-8 text-xs text-yellow-700">
                <strong>免责声明：</strong> 本测评仅供娱乐及自我调侃使用。测试结果由抽象算法随机生成，不具备任何临床心理学依据。如果你测出的结果是“懒散”，请不要以此为借口推掉明天的班。
            </div>

            <div class="flex flex-col md:flex-row gap-4">
                <button onclick="copyLink()" class="flex-1 bg-black text-white font-bold py-4 rounded-2xl hover:opacity-90 flex items-center justify-center">
                    邀请好友共赴深渊
                </button>
                <button onclick="location.reload()" class="px-8 border-2 border-gray-300 text-gray-500 font-bold py-4 rounded-2xl hover:bg-gray-100 transition">
                    重测
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        let allQuestions = [];
        let sessionQuestions = [];
        let currentIndex = 0;
        let scores = {};

        // 1. 洗牌算法，用于随机抽题
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        async function loadData() {
            try {
                const response = await fetch('https://i3doit.github.io/MyTools/SBTI/constants/questions.ts');
                const text = await response.text();
                const jsonStr = text.substring(text.indexOf('['), text.lastIndexOf(']') + 1);
                // 简单的正则容错处理
                const fixedJson = jsonStr.replace(/\/\/.*$/gm, "").replace(/,(\s*])/g, '$1').replace(/'/g, '"');
                allQuestions = JSON.parse(fixedJson);
                
                // 随机抽取 20 题
                sessionQuestions = shuffle([...allQuestions]).slice(0, 20);
            } catch (e) {
                console.error("加载失败", e);
                alert("网络似乎有点堵塞，请刷新重试。");
            }
        }

        window.startQuiz = async () => {
            await loadData();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        };

        function showQuestion() {
            const q = sessionQuestions[currentIndex];
            const container = document.getElementById('options-container');
            
            // UI 更新
            document.getElementById('q-counter').innerText = `QUESTION ${String(currentIndex + 1).padStart(2, '0')}/20`;
            document.getElementById('question-text').innerText = q.question;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / 20) * 100}%`;
            
            // 清空并生成新选项，防止选中态残留
            container.innerHTML = '';
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "btn-option w-full text-left p-5 border-2 border-gray-200 rounded-2xl font-bold hover:border-indigo-500 hover:text-indigo-600 bg-white";
                btn.innerText = opt.text;
                btn.onclick = () => handleSelect(opt.tag);
                container.appendChild(btn);
            });
        }

        function handleSelect(tag) {
            scores[tag] = (scores[tag] || 0) + 1;
            if (currentIndex < sessionQuestions.length - 1) {
                currentIndex++;
                showQuestion();
            } else {
                renderResult();
            }
        }

        function renderResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            // 1. 计算代码 (取分最高的前4个维度)
            const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
            const code = sorted.slice(0, 4).map(i => i[0]).join('');
            document.getElementById('result-code').innerText = code || "UNKN";

            // 2. 主类型判断
            const mainTypes = { 'S':'深度社恐专家', 'E':'外向孤独患者', 'M':'资深摸鱼导师', 'W':'精神卷王', 'C':'脆皮精神体', 'L':'逻辑强迫症' };
            document.getElementById('main-type').innerText = mainTypes[code[0]] || "混沌生命体";

            // 3. 结果描述
            document.getElementById('result-desc').innerText = `基于你的选择，你是一个典型的 [${code}] 类型。你擅长在工作中寻找空隙呼吸，在社交中寻找出口逃跑。你对世界的贡献主要是提供了大量的幽默感和偶尔的深夜emo。建议保持这种状态，反正改也改不掉。`;

            // 4. 15维度评分渲染 (假设共有15种维度，没有得分的显示0)
            const dimContainer = document.getElementById('dimension-stats');
            dimContainer.innerHTML = '';
            const allTags = ['S','E','M','W','C','P','L','B','A','R','K','F','O','T','V']; // 预设15个维度
            allTags.forEach(tag => {
                const val = scores[tag] || 0;
                const percent = Math.min((val / 8) * 100, 100); // 假设最高分8分
                dimContainer.innerHTML += `
                    <div>
                        <div class="flex justify-between text-xs font-bold mb-1">
                            <span>维度 ${tag}</span>
                            <span>${val} pts</span>
                        </div>
                        <div class="h-1.5 bg-gray-200 rounded-full">
                            <div class="h-full bg-indigo-400 rounded-full" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `;
            });
        }

        window.copyLink = () => {
            navigator.clipboard.writeText(window.location.href);
            alert("链接已复制！去发给那个比你更离谱的朋友吧。");
        };
    </script>
</body>
</html>
