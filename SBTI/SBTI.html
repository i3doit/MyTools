<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBTI 人格测试 - 纯净复刻版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-card:active { transform: scale(0.98); }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-yellow-400 min-h-screen flex items-center justify-center p-4">

    <div id="app" class="max-w-md w-full glass-morphism rounded-3xl shadow-2xl p-8 transition-all">
        <div id="start-screen" class="text-center">
            <h1 class="text-5xl font-black mb-4 text-black">SBTI</h1>
            <p class="text-gray-700 mb-8 font-medium">Silly Big Personality Test<br>比 MBTI 更懂你的离谱，比你妈更懂你的摸鱼。</p>
            <button onclick="startQuiz()" class="w-full bg-black text-white font-bold py-4 rounded-2xl hover:bg-gray-800 transition">
                开始审判
            </button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="mb-6">
                <div class="h-2 w-full bg-gray-200 rounded-full">
                    <div id="progress-bar" class="h-2 bg-black rounded-full transition-all" style="width: 0%"></div>
                </div>
                <p id="progress-text" class="text-right text-xs mt-2 font-mono text-gray-500">0%</p>
            </div>
            <h2 id="question-text" class="text-2xl font-bold mb-8 min-h-[80px]">载入中...</h2>
            <div id="options-container" class="space-y-4">
                </div>
        </div>

        <div id="result-screen" class="hidden text-center">
            <p class="text-sm font-mono text-gray-500 uppercase tracking-widest mb-2">Your SBTI Type is</p>
            <h1 id="result-code" class="text-7xl font-black mb-6 italic tracking-tighter">....</h1>
            <div class="bg-black text-white p-6 rounded-2xl mb-8">
                <p id="result-desc" class="text-lg leading-relaxed font-medium">
                    正在分析你的大脑回沟...
                </p>
            </div>
            <button onclick="location.reload()" class="w-full border-2 border-black font-bold py-4 rounded-2xl hover:bg-black hover:text-white transition">
                不服，重测
            </button>
        </div>
    </div>

    <script type="module">
        // 注意：因为你的 questions.ts 在 GitHub 上可能是 export default
        // 这里直接用动态 import 或者你之前生成的 JSON 结构
        let questions = [];
        let currentIndex = 0;
        let userScores = {};

        // 1. 初始化，获取题目
        async function loadQuestions() {
            try {
                // 如果是标准 TS 文件，直接 fetch 后用正则解析或引用
                // 这里假设你已经把它处理成 JS 格式，或直接在此处 fetch
                const response = await fetch('https://i3doit.github.io/MyTools/SBTI/constants/questions.ts');
                const text = await response.text();
                
                // 简单的正则提取 JSON 部分（如果你的文件是 export default [...] 格式）
                const jsonStr = text.substring(text.indexOf('['), text.lastIndexOf(']') + 1);
                // 这里的解析需要小心，如果 DeepSeek 生成的是标准 JSON，可以直接 parse
                // 如果带了注释，建议你在存储时存为标准的 .json 文件
                questions = JSON.parse(jsonStr.replace(/'/g, '"').replace(/,(\s*])/g, '$1')); 
            } catch (e) {
                console.error("加载失败", e);
                // 备用数据防止崩溃
                questions = [{id:1, question:"加载题目失败，要不刷新下？", options:[{text:"好的", tag:"S"}]}];
            }
        }

        window.startQuiz = async () => {
            await loadQuestions();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        };

        function showQuestion() {
            const q = questions[currentIndex];
            document.getElementById('question-text').innerText = q.question;
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-card w-full text-left p-5 border-2 border-black rounded-2xl font-bold hover:bg-black hover:text-white transition-all";
                btn.innerText = opt.text;
                btn.onclick = () => handleSelect(opt.tag);
                container.appendChild(btn);
            });

            // 更新进度
            const progress = ((currentIndex) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').innerText = `${Math.round(progress)}%`;
        }

        function handleSelect(tag) {
            userScores[tag] = (userScores[tag] || 0) + 1;
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            // 简单的计算逻辑：比如维度是 S/E, M/W, C/S, P/L
            // 如果你的 tag 就是 A, B, C, D，这里需要根据你定义的维度分组
            // 示例：取分值最高的四个字母
            const sortedTags = Object.entries(userScores).sort((a,b) => b[1] - a[1]);
            const code = sortedTags.slice(0, 4).map(item => item[0]).join('');
            
            document.getElementById('result-code').innerText = code;
            
            // 静态描述逻辑
            const descMap = {
                'SEMC': '你是纯正的“社恐摸鱼怪”。只要我不干活，老板就永远别想压榨我。',
                'EWP': '你是“社交卷王”。你的人生目标就是让所有人都在凌晨三点看到你的朋友圈。',
                // 这里可以根据生成的 code 匹配不同的文案
            };
            document.getElementById('result-desc').innerText = descMap[code] || "你的灵魂太过于独特，SBTI 系统差点烧毁。简单来说，你是一个迷人且危险的混沌个体。";
        }
    </script>
</body>
</html>
