<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>莫蘭迪色彩助手 Pro</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #f5f5f2;
            --card-bg: #ffffff;
            --text-main: #5d5d5d;
            --accent: #a89b8c;
            --phone-bg: #ffffff;
            --phone-text: #333333;
        }

        /* 深色模式變量 */
        .dark-mode {
            --phone-bg: #2d2d2d;
            --phone-text: #eeeeee;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { text-align: center; margin-bottom: 25px; width: 100%; }
        .picker-wrapper {
            background: var(--card-bg); padding: 12px 20px;
            border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: inline-flex; align-items: center; gap: 10px;
        }

        #baseColor { width: 40px; height: 30px; border: none; cursor: pointer; background: none; }

        /* 主佈局 */
        .main-content {
            display: flex; flex-direction: row; gap: 30px;
            width: 100%; max-width: 1000px; justify-content: center;
        }

        /* 手機預覽區 */
        .phone-mockup {
            width: 320px; background: var(--phone-bg);
            border: 10px solid #333; border-radius: 40px;
            height: 560px; position: relative; transition: all 0.3s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden;
        }

        .phone-nav { height: 60px; display: flex; align-items: center; padding: 0 20px; color: white; font-weight: bold; }
        .phone-content { padding: 25px; color: var(--phone-text); }
        .phone-card { background: rgba(150,150,150,0.1); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .btn-preview {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            color: white; font-weight: 500; cursor: pointer; transition: opacity 0.2s;
        }

        /* 配色與功能區 */
        .right-panel { flex-grow: 1; display: flex; flex-direction: column; gap: 20px; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-action {
            padding: 10px; border: 1px solid var(--accent); border-radius: 8px;
            background: white; color: var(--accent); cursor: pointer; font-size: 13px;
        }
        .btn-action:hover { background: var(--accent); color: white; }

        .palette-group { background: white; padding: 15px; border-radius: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .color-swatch { height: 70px; border-radius: 12px; margin-bottom: 5px; cursor: pointer; }
        .hex-label { font-size: 10px; text-align: center; font-family: monospace; }

        /* 版權與鏈接 */
        .footer-links {
            margin-top: 30px; text-align: center; font-size: 12px; color: #999;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
        }
        .footer-links a { color: var(--accent); text-decoration: none; font-weight: bold; }

        /* 隱藏的下載模板 (用於截圖) */
        #downloadTemplate {
            position: absolute; left: -9999px; width: 400px; padding: 40px;
            background: #fdfdfb; border-radius: 20px; text-align: center;
        }
        .template-color-block { height: 120px; border-radius: 20px; margin-bottom: 15px; display: flex; align-items: flex-end; justify-content: flex-end; padding: 15px; color: #fff; font-family: monospace; font-weight: bold; }

        /* Toast 提示 */
        .toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: white; padding: 12px 25px;
            border-radius: 50px; z-index: 10000; font-size: 14px;
        }

        @media (max-width: 850px) {
            .main-content { flex-direction: column; align-items: center; }
            .phone-mockup { width: 100%; max-width: 340px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="font-weight: 300; letter-spacing: 2px;">MORANDI ASSISTANT</h2>
        <div class="picker-wrapper">
            <input type="color" id="baseColor" value="#ac92ce">
            <span style="font-size: 14px; color: #888;">選取主色探索</span>
        </div>
    </div>

    <div class="main-content">
        <div class="phone-mockup" id="phoneWrapper">
            <div id="uiNav" class="phone-nav">MORANDI UI</div>
            <div class="phone-content">
                <div class="phone-card">
                    <div style="width: 30%; height: 8px; background: var(--accent); opacity: 0.3; margin-bottom: 10px; border-radius: 4px;"></div>
                    <div style="width: 80%; height: 6px; background: var(--accent); opacity: 0.1; margin-bottom: 6px;"></div>
                    <div style="width: 60%; height: 6px; background: var(--accent); opacity: 0.1;"></div>
                </div>
                <h3 id="uiText" style="margin: 30px 0 10px 0;">視覺層次預覽</h3>
                <p style="font-size: 13px; opacity: 0.7; line-height: 1.6;">
                    莫蘭迪色系的魅力在於不爭不搶，透過低飽和與灰調，讓介面在長久觀看下依然保持舒適感。
                </p>
                <button id="uiBtn" class="btn-preview" onclick="toggleDarkMode()">切換深色模式預覽</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="action-grid">
                <button class="btn-action" onclick="downloadPalette()">下載色卡清單</button>
                <button class="btn-action" onclick="copyPageLink()">複製頁面連結</button>
                <button class="btn-action" onclick="shareToPlatform()">分享到第三方</button>
                <button class="btn-action" onclick="contactAuthor()">聯繫作者</button>
            </div>

            <div class="palette-group">
                <h4 style="margin: 0 0 15px 0; font-size: 14px; color: #aaa;">經典莫蘭迪 (Classic)</h4>
                <div class="grid" id="classicGrid"></div>
            </div>

            <div class="palette-group">
                <h4 style="margin: 0 0 15px 0; font-size: 14px; color: #aaa;">漸進灰階 (Gradation)</h4>
                <div class="grid" id="gradationGrid"></div>
            </div>
            
            <div class="footer-links">
                <a href="https://mp.weixin.qq.com/s/uHh9gx2sUMOOjIhKyIbx4A" target="_blank">@艾兜兜兒</a>
                <a href="https://t.zsxq.com/FhQcu" target="_blank">🚀 免費星球</a>
                <span>© 2024 Morandi Pro</span>
            </div>
        </div>
    </div>

    <div id="downloadTemplate">
        <div style="font-size: 24px; color: #ac92ce; margin-bottom: 5px; font-weight: bold;">莫蘭迪配色</div>
        <div style="font-size: 12px; color: #aaa; margin-bottom: 30px; letter-spacing: 4px;">COLOR SHARING</div>
        <div id="templateColors"></div>
        <div style="margin-top: 20px; font-size: 10px; color: #ccc;">Generated by Morandi Assistant Pro</div>
    </div>

    <script>
        const baseColorInput = document.getElementById('baseColor');
        let currentColors = [];

        // 核心演算法
        function toMorandiHSL(h, s, l) {
            return { h, s: Math.min(s, 25), l: Math.max(50, Math.min(l, 75)) };
        }

        function hslToStr(hsl) { return `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`; }

        function hexToHSL(hex) {
            let r = parseInt(hex.slice(1,3), 16)/255, g = parseInt(hex.slice(3,5), 16)/255, b = parseInt(hex.slice(5,7), 16)/255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b), h, s, l = (max + min) / 2;
            if (max == min) h = s = 0;
            else {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return { h: Math.round(h*360), s: Math.round(s*100), l: Math.round(l*100) };
        }

        function updateUI() {
            const hex = baseColorInput.value;
            const rawHsl = hexToHSL(hex);
            const mMain = toMorandiHSL(rawHsl.h, rawHsl.s, rawHsl.l);
            const mSub = toMorandiHSL(rawHsl.h + 30, rawHsl.s, rawHsl.l);
            const mComp = toMorandiHSL(rawHsl.h + 180, rawHsl.s, rawHsl.l);

            // 更新手機預覽
            document.getElementById('uiNav').style.backgroundColor = hslToStr(mMain);
            document.getElementById('uiBtn').style.backgroundColor = hslToStr(mMain);
            document.getElementById('uiText').style.color = hslToStr(mMain);

            // 渲染色卡
            const classic = [mMain, mSub, mComp];
            const gradation = [{...mMain, l: 85}, {...mMain, l: 70}, {...mMain, l: 45}];
            currentColors = [...classic];

            renderGrid('classicGrid', classic);
            renderGrid('gradationGrid', gradation);
            updateDownloadTemplate(classic);
        }

        function renderGrid(id, colors) {
            const el = document.getElementById(id);
            el.innerHTML = colors.map(c => `
                <div onclick="copyText('${hslToStr(c)}')">
                    <div class="color-swatch" style="background: ${hslToStr(c)}"></div>
                    <div class="hex-label">${hslToStr(c)}</div>
                </div>
            `).join('');
        }

        // 功能實作
        function toggleDarkMode() {
            document.getElementById('phoneWrapper').classList.toggle('dark-mode');
        }

        function copyText(txt) {
            navigator.clipboard.writeText(txt);
            showToast("已複製色碼: " + txt);
        }

        function showToast(msg, duration = 2000) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), duration);
        }

        function contactAuthor() {
            navigator.clipboard.writeText("857023577");
            showToast("作者微信號 857023577 已複製", 2500);
        }

        function copyPageLink() {
            navigator.clipboard.writeText(window.location.href);
            showToast("頁面連結已複製");
        }

        function shareToPlatform() {
            const url = encodeURIComponent(window.location.href);
            window.open(`https://service.weibo.com/share/share.php?url=${url}&title=發現一個超讚的莫蘭迪配色工具！`);
        }

        function updateDownloadTemplate(colors) {
            const container = document.getElementById('templateColors');
            container.innerHTML = colors.map(c => `
                <div class="template-color-block" style="background: ${hslToStr(c)}">${hslToStr(c)}</div>
            `).join('');
        }

        async function downloadPalette() {
            showToast("正在生成高清色卡...");
            const template = document.getElementById('downloadTemplate');
            const canvas = await html2canvas(template, { scale: 3 }); // 高清 3 倍
            const link = document.createElement('a');
            link.download = `Morandi-Palette-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        baseColorInput.addEventListener('input', updateUI);
        window.onload = updateUI;
    </script>
</body>
</html>
