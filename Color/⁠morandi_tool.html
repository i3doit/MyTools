<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>莫蘭迪色彩助手 - 響應式版</title>
    <style>
        :root {
            --bg-color: #f0f0eb;
            --card-bg: #ffffff;
            --text-main: #5d5d5d;
            --accent: #a89b8c;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 控制區域 */
        .header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
        }

        .picker-wrapper {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }

        #baseColor {
            width: 60px;
            height: 40px;
            border: none;
            cursor: pointer;
            background: none;
        }

        /* 預覽區域佈局 */
        .main-content {
            display: flex;
            flex-direction: row;
            gap: 30px;
            width: 100%;
            max-width: 1000px;
            justify-content: center;
        }

        /* 模擬手機預覽窗 */
        .phone-mockup {
            width: 320px;
            min-width: 320px;
            background: #fff;
            border: 10px solid #333;
            border-radius: 35px;
            height: 550px;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .phone-nav {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .phone-content {
            padding: 20px;
        }

        .phone-card {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #eee;
        }

        .btn-preview {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            margin-top: 10px;
        }

        /* 色卡展示區 */
        .palette-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .palette-group {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .palette-group h3 {
            margin-top: 0;
            font-size: 0.9rem;
            color: #888;
            border-left: 3px solid var(--accent);
            padding-left: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
        }

        .color-item {
            text-align: center;
            cursor: pointer;
        }

        .color-swatch {
            height: 60px;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: transform 0.2s;
        }

        .color-item:active .color-swatch {
            transform: scale(0.95);
        }

        .hex-label {
            font-size: 10px;
            font-family: monospace;
            text-transform: uppercase;
        }

        /* 響應式處理：手機模式 */
        @media (max-width: 850px) {
            .main-content {
                flex-direction: column;
                align-items: center;
            }
            .phone-mockup {
                width: 100%;
                max-width: 340px;
                height: auto;
                min-height: 450px;
            }
            .palette-section {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="font-weight: 300;">Morandi Palette 🎨</h2>
        <div class="picker-wrapper">
            <span>選擇主色：</span>
            <input type="color" id="baseColor" value="#4A90E2">
        </div>
    </div>

    <div class="main-content">
        <div class="phone-mockup">
            <div id="uiNav" class="phone-nav">App Title</div>
            <div class="phone-content">
                <div class="phone-card">
                    <div style="width: 40%; height: 8px; background: #ddd; margin-bottom: 10px; border-radius: 4px;"></div>
                    <div style="width: 90%; height: 6px; background: #eee; margin-bottom: 6px; border-radius: 3px;"></div>
                    <div style="width: 70%; height: 6px; background: #eee; border-radius: 3px;"></div>
                </div>
                <h4 id="uiText" style="margin: 20px 0 10px 0;">視覺層次預覽</h4>
                <p style="font-size: 12px; color: #999; line-height: 1.6;">
                    莫蘭迪色系的魅力在於不爭不搶，透過低飽和度的灰調，讓介面在長久觀看下依然保持舒適。
                </p>
                <button id="uiBtn" class="btn-preview">確認送出</button>
            </div>
        </div>

        <div class="palette-section" id="paletteResults">
            </div>
    </div>

    <script>
        const baseColorInput = document.getElementById('baseColor');
        const paletteContainer = document.getElementById('paletteResults');

        // 核心：莫蘭迪化邏輯
        function toMorandiHSL(h, s, l) {
            // 壓縮飽和度至 15%-30% 之間，亮度鎖定在 50%-75%
            const mS = Math.min(s, 25); 
            const mL = Math.max(50, Math.min(l, 70));
            return { h, s: mS, l: mL };
        }

        function hslToString(hsl) {
            return `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
        }

        function hexToHSL(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) h = s = 0;
            else {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
        }

        function updateUI() {
            const hex = baseColorInput.value;
            const rawHsl = hexToHSL(hex);
            
            // 核心莫蘭迪色
            const mMain = toMorandiHSL(rawHsl.h, rawHsl.s, rawHsl.l);
            const mSub = toMorandiHSL(rawHsl.h + 30, rawHsl.s, rawHsl.l);
            const mComp = toMorandiHSL(rawHsl.h + 180, rawHsl.s, rawHsl.l);

            // 更新預覽
            document.getElementById('uiNav').style.backgroundColor = hslToString(mMain);
            document.getElementById('uiBtn').style.backgroundColor = hslToString(mMain);
            document.getElementById('uiText').style.color = hslToString({h: mMain.h, s: 10, l: 30});

            // 生成色卡組
            const groups = [
                { name: '經典莫蘭迪 (Classic)', colors: [mMain, mSub, mComp] },
                { name: '漸進灰階 (Gradation)', colors: [
                    {...mMain, l: 40}, {...mMain, l: 60}, {...mMain, l: 80}
                ]}
            ];

            paletteContainer.innerHTML = '';
            groups.forEach(group => {
                const div = document.createElement('div');
                div.className = 'palette-group';
                div.innerHTML = `<h3>${group.name}</h3>`;
                const grid = document.createElement('div');
                grid.className = 'grid';
                
                group.colors.forEach(c => {
                    const colorStr = hslToString(c);
                    grid.innerHTML += `
                        <div class="color-item" onclick="copyHex('${colorStr}')">
                            <div class="color-swatch" style="background: ${colorStr}"></div>
                            <div class="hex-label">${colorStr}</div>
                        </div>
                    `;
                });
                div.appendChild(grid);
                paletteContainer.appendChild(div);
            });
        }

        function copyHex(txt) {
            navigator.clipboard.writeText(txt);
            // 簡單的反饋
            const toast = document.createElement('div');
            toast.innerText = '已複製色彩代碼';
            toast.style = 'position:fixed; bottom:20px; background:#333; color:#fff; padding:10px 20px; border-radius:20px; font-size:12px; z-index:9999;';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        }

        baseColorInput.addEventListener('input', updateUI);
        window.onload = updateUI;
    </script>
</body>
</html>
