<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF 转 Word (带错误日志版)</title>
    
    <script src="https://lf26-cdn-tos.bytecdntp.com/cdn/expire-1-M/pdf.js/2.13.216/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.1.0/build/index.umd.js"></script>
    <script src="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --primary: #0078d4; --bg: #f3f2f1; --danger: #d83b01; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); text-align: center; }
        .upload-box { border: 2px dashed #d2d0ce; border-radius: 12px; padding: 30px; margin: 20px 0; cursor: pointer; background: #faf9f8; position: relative; }
        #fileInput { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
        .file-info { background: #f0f7ff; padding: 12px; border-radius: 8px; margin-bottom: 15px; display: none; text-align: left; font-size: 13px; border-left: 4px solid var(--primary); }
        .btn { background-color: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:disabled { background-color: #c8c6c4; cursor: not-allowed; }
        
        /* 日志区域样式 */
        .log-container { width: 100%; max-width: 500px; margin-top: 20px; background: #333; color: #adff2f; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; text-align: left; box-sizing: border-box; }
        .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; color: #eee; border-bottom: 1px solid #555; padding-bottom: 5px; }
        .log-content { max-height: 150px; overflow-y: auto; white-space: pre-wrap; cursor: pointer; }
        .log-content:hover { background: #444; }
        .copy-tip { color: #aaa; font-size: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin: 0 0 10px 0;">PDF ➔ Word</h2>
    <div id="envStatus" style="font-size: 12px; color: var(--danger);">正在检测库环境...</div>

    <div class="upload-box">
        <span id="promptText">点击选择 PDF 文件</span>
        <input type="file" id="fileInput" accept="application/pdf">
    </div>

    <div id="fileDetail" class="file-info">
        <div>📄 <span id="infoName">-</span></div>
        <div>⚖️ 大小: <b id="infoSize">-</b></div>
    </div>

    <button id="convertBtn" class="btn" disabled>等待环境就绪</button>
</div>

<div class="log-container">
    <div class="log-header">
        <span>运行日志 (Console Log)</span>
        <span class="copy-tip">点击下方内容可复制</span>
    </div>
    <div id="logContent" class="log-content">系统初始化中...</div>
</div>

<script>
    const logContent = document.getElementById('logContent');
    const envStatus = document.getElementById('envStatus');
    const convertBtn = document.getElementById('convertBtn');
    const fileInput = document.getElementById('fileInput');
    const fileDetail = document.getElementById('fileDetail');

    // --- 日志记录功能 ---
    function addLog(msg, isError = false) {
        const time = new Date().toLocaleTimeString();
        const prefix = isError ? "[❌ ERROR]" : "[OK]";
        logContent.innerText += `\n${time} ${prefix} ${msg}`;
        logContent.scrollTop = logContent.scrollHeight;
    }

    // --- 复制日志功能 ---
    logContent.onclick = () => {
        navigator.clipboard.writeText(logContent.innerText);
        alert("日志已复制到剪贴板");
    };

    // --- 环境检测 ---
    function checkLibraries() {
        const checks = {
            pdfjs: typeof window['pdfjs-dist/build/pdf'] !== 'undefined',
            docx: typeof window.docx !== 'undefined',
            saveAs: typeof window.saveAs !== 'undefined'
        };

        if (checks.pdfjs && checks.docx && checks.saveAs) {
            envStatus.innerText = "✅ 所有核心库加载成功";
            envStatus.style.color = "green";
            if (fileInput.files.length > 0) convertBtn.disabled = false;
            convertBtn.innerText = "立即转换并下载";
            addLog("环境初始化完成，等待用户操作");
        } else {
            let missing = [];
            if (!checks.pdfjs) missing.push("pdf.js");
            if (!checks.docx) missing.push("docx.js");
            if (!checks.saveAs) missing.push("FileSaver.js");
            
            envStatus.innerText = "⚠️ 缺少库: " + missing.join(", ");
            addLog("库检测失败: " + missing.join(", "), true);
            setTimeout(checkLibraries, 2000);
        }
    }

    // 初始化运行
    window.onload = checkLibraries;

    // --- 文件处理 ---
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            document.getElementById('infoName').innerText = file.name;
            document.getElementById('infoSize').innerText = (file.size / 1024 / 1024).toFixed(2) + " MB";
            fileDetail.style.display = 'block';
            addLog(`已选择文件: ${file.name} (${file.size} bytes)`);
            if (envStatus.innerText.includes("成功")) convertBtn.disabled = false;
        }
    };

    // --- 转换逻辑 ---
    convertBtn.onclick = async () => {
        const file = fileInput.files[0];
        if (!file) return;

        try {
            convertBtn.disabled = true;
            addLog("开始转换流程...");
            
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://lf26-cdn-tos.bytecdntp.com/cdn/expire-1-M/pdf.js/2.13.216/pdf.worker.min.js';

            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
            addLog(`PDF读取成功，共 ${pdf.numPages} 页`);

            const docChildren = [];
            for (let i = 1; i <= pdf.numPages; i++) {
                addLog(`正在解析第 ${i} 页...`);
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');

                if (pageText.trim()) {
                    docChildren.push(new window.docx.Paragraph({
                        children: [new window.docx.TextRun({ text: pageText, size: 24 })],
                        spacing: { before: 120, after: 120 }
                    }));
                }
            }

            addLog("正在封装 Word 数据包...");
            const doc = new window.docx.Document({
                sections: [{ properties: {}, children: docChildren }]
            });

            const blob = await window.docx.Packer.toBlob(doc);
            window.saveAs(blob, file.name.replace(/\.pdf$/i, "") + ".docx");
            addLog("✅ 转换成功，已触发浏览器下载");
            
        } catch (err) {
            addLog(`转换崩溃: ${err.stack || err.message}`, true);
            alert("发生错误，请查看下方日志并复制反馈");
        } finally {
            convertBtn.disabled = false;
        }
    };
</script>

</body>
</html>
