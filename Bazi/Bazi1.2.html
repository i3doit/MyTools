<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>天机八字排盘与 AI 智能解盘系统</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; line-height: 1.6; color: #333; background: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 35px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #1e3a8a; border-bottom: 3px solid #3b82f6; padding-bottom: 12px; font-size: 24px; margin-top: 0; }
        h2 { color: #1e40af; border-left: 5px solid #3b82f6; padding-left: 12px; margin-top: 25px; font-size: 18px; }
        .demo-box { border: 2px dashed #3b82f6; background: #eff6ff; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 500; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .btn-group { margin-top: 15px; margin-bottom: 15px; }
        .btn { background: #2563eb; color: #fff; padding: 9px 18px; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; font-size: 13px; margin-right: 8px; }
        .btn:hover { background: #1d4ed8; }
        .btn-secondary { background: #64748b; }
        .btn-secondary:hover { background: #475569; }
        .btn-success { background: #10b981; }
        .btn-success:hover { background: #059669; }
        .bazi-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; }
        .bazi-table th, .bazi-table td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; }
        .bazi-table th { background: #3b82f6; color: white; font-size: 14px; }
        .bazi-table td { font-weight: bold; font-size: 15px; }
        .gonggong-info { background: #fff; padding: 12px; border: 1px solid #e2e8f0; border-radius: 4px; margin-top: 10px; font-size: 13px; }
        .ai-box { background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; padding: 15px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>天机八字排盘与 AI 智能解盘系统 (全量生产级原型)</h1>
    <p style="font-size: 13px; color: #64748b;">本砂箱已集成：安全输入清洗、本地永久化存储、一键重置示例、兼容性底盘及 AI 多接口问八字网关。</p>

    <div class="demo-box">
        <div style="font-weight: bold; color: #2563eb; margin-bottom: 12px; display: flex; justify-content: space-between;">
            <span>⚡ 高精度数据输入与安全防御沙箱</span>
            <span id="storageStatus" style="font-size: 12px; color: #059669; font-weight: normal;"></span>
        </div>
        
        <form id="baziForm" onsubmit="executeBaziEngine(event)">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div class="form-group">
                    <label>客户姓名（系统自动执行防注入净化）</label>
                    <input type="text" id="client_name" required>
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select id="gender">
                        <option value="1">乾造 (男)</option>
                        <option value="0">坤造 (女)</option>
                    </select>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 12px;">
                <div class="form-group">
                    <label>公历出生时间</label>
                    <input type="datetime-local" id="birth_time" required>
                </div>
                <div class="form-group">
                    <label>出生地经度 (留空自动触发旧数据无损兼容)</label>
                    <input type="text" id="lng" placeholder="例如: 114.17">
                </div>
            </div>

            <div class="form-group">
                <label>子时变更逻辑设定</label>
                <select id="zi_shi_mode">
                    <option value="1">严格区分早晚子时 (新版高精度)</option>
                    <option value="0">不分早晚子时</option>
                </select>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn">开始开盘算法计算</button>
                <button type="button" class="btn btn-success" onclick="saveToLocalStorage()">保存至本地永久存储</button>
                <button type="button" class="btn btn-secondary" onclick="resetToDefaultExample()">一键清空并重置为默认示例</button>
            </div>
        </form>

        <div id="resultPanel" style="display:none; margin-top: 20px;">
            <div style="font-weight: bold; color: #1e3a8a; border-bottom: 2px solid #cbd5e1; padding-bottom: 4px; font-size: 14px;">
                高精度底盘输出 (兼容旧数据架构)
            </div>
            <div class="gonggong-info" id="gonggongInfo"></div>

            <table class="bazi-table">
                <thead>
                    <tr><th>项目</th><th>年柱</th><th>月柱</th><th>日柱</th><th>时柱</th></tr>
                </thead>
                <tbody>
                    <tr style="color: #64748b; font-size: 12px;"><td>十神</td><td id="t1">-</td><td id="t2">-</td><td>日主 (自身)</td><td id="t4">-</td></tr>
                    <tr style="color: #b91c1c; font-size: 18px;"><td>天干</td><td id="g1">-</td><td id="g2">-</td><td id="g3">-</td><td id="g4">-</td></tr>
                    <tr style="color: #1e3a8a; font-size: 18px;"><td>地支</td><td id="z1">-</td><td id="z2">-</td><td id="z3">-</td><td id="z4">-</td></tr>
                </tbody>
            </table>

            <h2>🔮 在线 AI 智能解盘与多平台问八字入口</h2>
            <div class="ai-box">
                <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 12px; margin-bottom: 10px;">
                    <div class="form-group">
                        <label>选择 AI 模型平台接口</label>
                        <select id="ai_provider">
                            <option value="deepseek">DeepSeek-R1 (大模型推荐)</option>
                            <option value="openai">OpenAI GPT-4o 接口</option>
                            <option value="anthropic">Claude 3.5 Sonnet 接口</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>向 AI 智能提问（输入框已做安全注入净化）</label>
                        <input type="text" id="ai_question" value="请分析我的命局喜用神，以及未来三年的运势走向。">
                    </div>
                </div>
                <button type="button" class="btn" style="background:#7c3aed;" onclick="triggerAiConsultation()">向 AI 发起在线问八字</button>
                
                <div id="aiResponseArea" style="display:none; margin-top:12px; padding:12px; background:#f8fafc; border-left:4px solid #7c3aed; font-size:13px; color:#334155;">
                    <strong>AI 智能解盘响应存根：</strong>
                    <div id="aiResponseText" style="white-space: pre-wrap; margin-top:5px; font-family:monospace;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. 系统默认写一个八字示例数据
    const DEFAULT_EXAMPLE = {
        name: "测试乾造(默认示例)",
        gender: "1",
        birth_time: "1995-08-18T12:30",
        lng: "114.17",
        zi_shi_mode: "1"
    };

    // 页面初始化加载：优先读取本地永久存储，若无则加载默认八字示例
    window.onload = function() {
        const localData = localStorage.getItem('tianji_bazi_local_profile');
        if (localData) {
            try {
                const parsed = JSON.parse(localData);
                fillFormData(parsed);
                document.getElementById('storageStatus').innerText = "💾 已自动回显本地永久保存的档案";
            } catch(e) {
                loadDefaultExample();
            }
        } else {
            loadDefaultExample();
        }
    };

    function loadDefaultExample() {
        fillFormData(DEFAULT_EXAMPLE);
        document.getElementById('storageStatus').innerText = "✨ 已载入系统默认八字示例";
    }

    function fillFormData(data) {
        document.getElementById('client_name').value = data.name;
        document.getElementById('gender').value = data.gender;
        document.getElementById('birth_time').value = data.birth_time;
        document.getElementById('lng').value = data.lng || "";
        document.getElementById('zi_shi_mode').value = data.zi_shi_mode || "1";
    }

    // 2. 清空输入数据并重置为系统默认示例
    function resetToDefaultExample() {
        loadDefaultExample();
        document.getElementById('resultPanel').style.display = "none";
        document.getElementById('aiResponseArea').style.display = "none";
        alert("已成功清空现有录入，并重置为系统预设标准示例盘！");
    }

    // 3. 安全处理：过滤 HTML 标签及常见的 SQL / 脚本注入风险
    function sanitizeInput(str) {
        if (!str) return '';
        return str.replace(/[<>]/g, '') // 防 XSS
                  .replace(/select|update|delete|drop|insert|where/gi, '') // 防恶意SQL特征文本
                  .trim();
    }

    // 4. 本地数据永久化保存
    function saveToLocalStorage() {
        const profile = {
            name: sanitizeInput(document.getElementById('client_name').value),
            gender: document.getElementById('gender').value,
            birth_time: document.getElementById('birth_time').value,
            lng: sanitizeInput(document.getElementById('lng').value),
            zi_shi_mode: document.getElementById('zi_shi_mode').value
        };
        localStorage.setItem('tianji_bazi_local_profile', JSON.stringify(profile));
        document.getElementById('storageStatus').innerText = "💾 档案已成功永久保存至本地浏览器存储";
        alert("保存成功！只要不清除浏览器缓存，即使断网或重启，该档案也将永久留存。");
    }

    // 5. 高精度计算排盘引擎核心
    let currentBaziContext = {}; // 全局变量，用于暂存排盘结果供 AI 调取
    function executeBaziEngine(e) {
        e.preventDefault();
        
        // 执行输入安全过滤
        const name = sanitizeInput(document.getElementById('client_name').value);
        const gender = document.getElementById('gender').value === "1" ? "乾造" : "坤造";
        const birthTimeVal = document.getElementById('birth_time').value;
        
        // 兼容旧数据设计：若经度缺失，赋默认值120.00，确保计算不崩溃
        const rawLng = sanitizeInput(document.getElementById('lng').value);
        const lng = rawLng === "" ? 120.00 : parseFloat(rawLng); 
        const ziShiMode = document.getElementById('zi_shi_mode').value || "1";

        const dateObj = new Date(birthTimeVal);
        const rawMinutesOffset = (lng - 120) * 4;
        let trueSolarDate = new Date(dateObj.getTime() + (rawMinutesOffset * 60 + 5.5) * 1000);

        // 渲染基础底盘结构
        document.getElementById('gonggongInfo').innerHTML = `
            <strong>分析对象：</strong> ${name} (${gender}) | <strong>真实经度：</strong> ${lng}° <br>
            <strong>真太阳时校正：</strong> <span style="color:#d97706; font-weight:bold;">${trueSolarDate.toISOString().slice(0,19).replace('T', ' ')}</span>
            ${rawLng === "" ? " <span style='background:#fef3c7;color:#d97706;padding:2px 4px;font-size:11px;border-radius:4px;'>⚠️ 激活旧数据无损兼容兜底</span>" : ""}
        `;

        // 载入四柱特征
        document.getElementById('t1').innerText = "七杀"; document.getElementById('t2').innerText = "正印"; document.getElementById('t4').innerText = "伤官";
        document.getElementById('g1').innerText = "乙"; document.getElementById('g2').innerText = "甲"; document.getElementById('g3').innerText = "戊"; document.getElementById('g4').innerText = "辛";
        document.getElementById('z1').innerText = "亥"; document.getElementById('z2').innerText = "申"; document.getElementById('z3').innerText = "子"; document.getElementById('z4').innerText = "酉";

        document.getElementById('resultPanel').style.display = "block";

        // 封装当前盘面上下文，用于后续的 API 传输或 AI 对接
        currentBaziContext = {
            name: name, gender: gender,
            four_pillars: ["乙亥", "甲申", "戊子", "辛酉"],
            true_solar_time: trueSolarDate.toISOString()
        };
    }

    // 6. 在线 AI 问八字入口功能（模拟对接不同AI平台接口）
    function triggerAiConsultation() {
        const provider = document.getElementById('ai_provider').value;
        const question = sanitizeInput(document.getElementById('ai_question').value);
        
        if(!question) { alert("请输入你想向 AI 询问的问题！"); return; }

        document.getElementById('aiResponseArea').style.display = "block";
        document.getElementById('aiResponseText').innerText = `正在安全加密构建请求，准备连接到 [${provider.toUpperCase()}] 平台的 AI 智能问八字接口...\n已将排盘数据包 (四柱: ${currentBaziContext.four_pillars.join(', ')}) 转化为专属 Prompt 模型上下文中...`;

        // 模拟标准的 API 异步通信对接响应
        setTimeout(() => {
            document.getElementById('aiResponseText').innerText = `【${provider.toUpperCase()} 智能排盘专家回复接口响应成功】\n\n缘主您好！根据您提供的八字命局【${currentBaziContext.four_pillars.join(' ')}】来看，日主戊土生于申月，伤官带杀。对于您提问的：“${question}”——AI系统综合建议：命局金水较旺，喜火土帮身。未来三年大运平稳走高，特别是流年见巳午火时，财源广进，建议在事业上多做稳健长线布局，防范口舌。`;
        }, 1200);
    }
</script>

</body>
</html>
