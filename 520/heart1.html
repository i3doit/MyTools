<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>520 致最爱的你</title>
    <style>
        :root {
            --primary-pink: #ff758c;
            --secondary-pink: #ff7eb3;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Noto Serif CJK SC", "Source Han Serif SC", "Source Han Serif CN", "STSong", "Songti SC", serif;
            background: #0d0914; /* 深邃夜空底色 */
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        /* 烟花 Canvas 画布 */
        #fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            background: rgba(20, 15, 30, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(255, 117, 140, 0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        /* 文本呈现区 */
        .confession-text {
            font-size: 1.35rem;
            line-height: 1.8;
            letter-spacing: 2px;
            color: #ffe3e3;
            margin-bottom: 30px;
            min-height: 100px;
            white-space: pre-line;
            font-weight: 500;
            text-shadow: 0 2px 10px rgba(255,117,140,0.3);
        }

        /* 交互按钮 */
        .btn {
            background: linear-gradient(90deg, var(--primary-pink), var(--secondary-pink));
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.3);
            transition: all 0.3s ease;
            outline: none;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 117, 140, 0.5);
        }

        /* 表单与输入框 */
        .input-group {
            margin-top: 20px;
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        .input-control {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid rgba(255, 117, 140, 0.3);
            border-radius: 50px;
            font-size: 0.95rem;
            margin-bottom: 12px;
            outline: none;
            text-align: center;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .input-control:focus {
            border-color: var(--primary-pink);
            box-shadow: 0 0 8px rgba(255,117,140,0.4);
        }

        .hint-text {
            font-size: 0.85rem;
            color: #c9b0b4;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .wechat-highlight {
            color: var(--secondary-pink);
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
        }

        /* 提示弹窗 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 0.95rem;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        /* 页脚品牌标识 */
        .footer-logo {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #8c7679;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .footer-logo:hover {
            color: var(--primary-pink);
        }

        .footer-logo svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <div class="container">
        <div class="confession-text" id="confessionDisplay">
            浮世三千，吾爱有三。<br>日、月与卿。<br>日为朝，月为暮，卿为朝朝暮暮。
        </div>

        <div id="actionArea">
            <button class="btn" onclick="showUnlockSection()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                定制我的520文案
            </button>
        </div>

        <div class="input-group" id="unlockSection">
            <p class="hint-text">
                请添加作者微信号：<span class="wechat-highlight" onclick="copyWeChat()">857023577</span><br>回复“520”获取验证码解锁自定义功能
            </p>
            <input type="text" class="input-control" id="verifyCode" placeholder="请输入验证码">
            <button class="btn" onclick="verifyCode()">验证并解锁</button>
        </div>

        <div class="input-group" id="editSection">
            <textarea class="input-control" id="customText" rows="3" placeholder="在这里写下你的深情告白..."></textarea>
            <button class="btn" onclick="generateShare()">生成专属表白链接</button>
        </div>

        <a href="#" class="footer-logo" target="_blank">
            <svg viewBox="0 0 24 24">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
            <span>LoveCraft 创意工坊提供技术支持</span>
        </a>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const CORRECT_CODE = "5201314";

        // --- 烟花公式动效引擎 ---
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let rockets = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 核心数学公式：生成 "♡ + ♡ = ♡²" 的点阵坐标
        function getFormulaPoints(centerX, centerY, scale) {
            const points = [];
            
            // 绘制单个爱心的数学模型方程
            function appendHeart(offsetX, offsetY, heartScale) {
                for (let angle = 0; angle < Math.PI * 2; angle += 0.05) {
                    // 经典爱心极坐标方程
                    const x = 16 * Math.pow(Math.sin(angle), 3);
                    const y = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
                    points.push({
                        x: centerX + (x * heartScale) + offsetX,
                        y: centerY + (y * heartScale) + offsetY
                    });
                }
            }

            // 绘制符合要求的符号
            function appendText(text, offsetX, offsetY, size) {
                ctx.save();
                ctx.font = `bold ${size}px Arial`;
                ctx.textBaseline = 'middle';
                ctx.textAlign = 'center';
                // 利用临时离屏渲染获取文字像素点阵，保证跨平台精准度
                const buffer = document.createElement('canvas');
                buffer.width = 150;
                buffer.height = 100;
                const bCtx = buffer.getContext('2d');
                bCtx.font = `bold ${size}px Arial`;
                bCtx.fillStyle = 'white';
                bCtx.fillText(text, 75, 50);
                
                const imgData = bCtx.getImageData(0, 0, 150, 100).data;
                for (let y = 0; y < 100; y += 4) {
                    for (let x = 0; x < 150; x += 4) {
                        if (imgData[(y * 150 + x) * 4 + 3] > 128) {
                            points.push({
                                x: centerX + (x - 75) + offsetX,
                                y: centerY + (y - 50) + offsetY
                            });
                        }
                    }
                }
                ctx.restore();
            }

            // 排版布局: ♡  +  ♡  =  ♡ ²
            const step = scale * 22; 
            appendHeart(-step, -20, scale);       // 第一个心
            appendText("+", -step * 0.4, -15, 30); // 加号
            appendHeart(0, -20, scale);          // 第二个心
            appendText("=", step * 0.4, -15, 30);  // 等于号
            appendHeart(step, -20, scale);       // 第三个心
            appendText("2", step * 1.35, -40, 18); // 平方号

            return points;
        }

        class Rocket {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.tx = canvas.width / 2;
                this.ty = canvas.height * 0.25; // 绽放核心高度在屏幕上方25%处
                this.speed = 4 + Math.random() * 3;
                this.angle = Math.atan2(this.ty - this.y, this.tx - this.x);
                this.hue = Math.random() * 40 + 340; // 浪漫粉红金色调
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                
                // 接近目标点时爆炸
                if (Math.abs(this.y - this.ty) < 10) {
                    explodeFormula(this.tx, this.ty, this.hue);
                    return false;
                }
                return true;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, 70%)`;
                ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, tx, ty, hue) {
                this.x = x;
                this.y = y;
                this.tx = tx;
                this.ty = ty;
                // 飞向点阵的目标速度
                this.vx = (tx - x) * (0.04 + Math.random() * 0.02);
                this.vy = (ty - y) * (0.04 + Math.random() * 0.02);
                this.alpha = 1;
                this.life = 150 + Math.random() * 50; 
                this.hue = hue;
                this.size = Math.random() * 2 + 1;
                this.stage = 1; // 1: 汇聚成形状, 2: 散落坠落
            }
            update() {
                if (this.stage === 1) {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.life--;
                    if (this.life <= 60) {
                        this.stage = 2;
                        this.vx = (Math.random() - 0.5) * 2;
                        this.vy = Math.random() * 1.5 + 0.5; // 重力下坠
                    }
                } else {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.alpha -= 0.015;
                }
                return this.alpha > 0;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, ${70 + Math.random() * 30}%)`;
                // 增加星光霓虹流光感
                ctx.shadowBlur = 6;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 70%)`;
                ctx.fill();
                ctx.restore();
            }
        }

        function explodeFormula(cx, cy, hue) {
            // 自动根据屏幕大小调整公式缩放比例
            const scale = canvas.width < 500 ? 5 : 8;
            const targets = getFormulaPoints(cx, cy, scale);
            
            targets.forEach(t => {
                // 粒子从中心点散射，并向公式点阵目标移动
                particles.push(new Particle(cx, cy, t.x, t.y, hue));
            });
        }

        // 动画主循环
        function animLoop() {
            ctx.fillStyle = 'rgba(13, 9, 20, 0.2)'; // 留尾迹效果
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 自动定时发射烟花火箭
            if (rockets.length === 0 && Math.random() < 0.02) {
                rockets.push(new Rocket());
            }

            rockets = rockets.filter(r => {
                r.update();
                r.draw();
                return r.y > r.ty;
            });

            particles = particles.filter(p => {
                const alive = p.update();
                p.draw();
                return alive;
            });

            requestAnimationFrame(animLoop);
        }

        // --- 原交互逻辑保持并优化 ---
        window.onload = function() {
            animLoop();
            const urlParams = new URLSearchParams(window.location.search);
            const sharedText = urlParams.get('text');
            if (sharedText) {
                document.getElementById('confessionDisplay').innerHTML = decodeURIComponent(sharedText);
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function copyWeChat() {
            const wechatId = "857023577";
            navigator.clipboard.writeText(wechatId).then(() => {
                showToast(`微信号 ${wechatId} 已自动复制！\n正在打开微信... (提示将在3秒后关闭)`);
            }).catch(() => {
                showToast(`请长按复制微信号: ${wechatId}`);
            });
        }

        function showUnlockSection() {
            document.getElementById('actionArea').style.display = 'none';
            document.getElementById('unlockSection').style.display = 'block';
        }

        function verifyCode() {
            const inputCode = document.getElementById('verifyCode').value.trim();
            if (inputCode === CORRECT_CODE) {
                showToast("解锁成功！快来定制你的专属告白吧~");
                document.getElementById('unlockSection').style.display = 'none';
                document.getElementById('editSection').style.display = 'block';
                const currentText = document.getElementById('confessionDisplay').innerText;
                document.getElementById('customText').value = currentText;
            } else {
                showToast("验证码不正确哦，请添加作者微信获取");
            }
        }

        function generateShare() {
            const textInput = document.getElementById('customText').value.trim();
            if (!textInput) {
                showToast("写点什么吧，深情不能留白哦~");
                return;
            }
            document.getElementById('confessionDisplay').innerHTML = textInput.replace(/\n/g, '<br>');
            const encodedText = encodeURIComponent(textInput);
            const shareUrl = `${window.location.origin}${window.location.pathname}?text=${encodedText}`;

            navigator.clipboard.writeText(shareUrl).then(() => {
                showToast("专属表白链接已生成并复制！\n赶快发给心爱的Ta或者分享到朋友圈吧~");
                // 成功生成时，立刻手动触发一发浪漫公式烟花
                rockets.push(new Rocket());
            }).catch(() => {
                showToast("生成成功！请复制浏览器地址栏链接分享");
            });
        }
    </script>
</body>
</html>
