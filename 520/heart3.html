<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>520 浪漫表白动态烟花小工具</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-pink: #ff758c;
            --secondary-pink: #ff7eb3;
            --text-light: #ffffff;
            --glass-bg: rgba(20, 15, 30, 0.5);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Noto Serif CJK SC", "Source Han Serif SC", "Source Han Serif CN", "STSong", "Songti SC", serif;
            background: #06030c; 
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            padding: 20px;
        }

        /* 烟花 Canvas 完全全屏置底 */
        #fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 倒计时样式 */
        #countdownOverlay {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px var(--primary-pink);
            z-index: 5;
            font-family: Arial, sans-serif;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s ease;
        }
        #countdownOverlay.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2);
        }

        /* 沉浸式文案展示区（无卡片背景） */
        .text-container {
            position: relative;
            z-index: 10;
            margin: auto 0;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
            pointer-events: none; /* 让出鼠标事件方便未来交互 */
        }

        /* 专门用来给 html2canvas 截图的隐藏域（生成图片时动态赋予精美背景） */
        #captureArea {
            padding: 40px 25px;
            border-radius: 24px;
            background: transparent;
        }

        .confession-text {
            font-size: 1.45rem;
            line-height: 1.9;
            letter-spacing: 3px;
            color: #ffffff;
            min-height: 140px;
            white-space: pre-line;
            font-weight: 500;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.6), 0 2px 15px var(--primary-pink);
        }

        /* 打字机光标效果 */
        .typing-cursor::after {
            content: '|';
            animation: blink 0.8s infinite;
            color: var(--secondary-pink);
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

        /* 底部控制面板 */
        .bottom-controls {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
            text-align: center;
        }

        /* 颜色切换面板 */
        .color-panel {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
            background: var(--glass-bg);
            padding: 8px 15px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .color-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }
        .color-dot:hover { transform: scale(1.2); }
        .color-dot.active { border-color: #fff; transform: scale(1.1); }

        /* 按钮与交互 */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .btn {
            background: linear-gradient(90deg, var(--primary-pink), var(--secondary-pink));
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 0.85rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 117, 140, 0.3);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(255, 117, 140, 0.5);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: none;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 矩阵社交分享面板 */
        .share-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 12px 0 20px;
        }
        .share-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
            color: #ddd;
        }
        .share-icon:hover {
            transform: translateY(-3px);
            background: var(--primary-pink);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4);
        }

        /* 引导与解锁下抽屉弹窗 */
        .popup-modal {
            display: none;
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 100%;
            max-width: 500px;
            background: rgba(15, 10, 25, 0.96);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            border: 1px solid var(--glass-border);
            padding: 30px 24px;
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
        }
        .popup-modal.show { transform: translateX(-50%) translateY(0); }

        .popup-header {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--secondary-pink);
            font-weight: bold;
        }

        .input-control {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid rgba(255, 117, 140, 0.3);
            border-radius: 16px;
            font-size: 0.95rem;
            margin-bottom: 15px;
            outline: none;
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        .hint-text {
            font-size: 0.85rem;
            color: #c9b0b4;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        /* 微信号带复制图标包裹层 */
        .wechat-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--secondary-pink);
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
            background: rgba(255,117,140,0.15);
            padding: 2px 8px;
            border-radius: 6px;
            animation: pulseMini 2s infinite;
        }
        .wechat-wrapper svg { width: 14px; height: 14px; fill: currentColor; }

        @keyframes pulseMini {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .close-popup {
            position: absolute;
            top: 15px;
            right: 20px;
            cursor: pointer;
            color: #aaa;
            font-size: 1.2rem;
        }

        /* 提示通知 */
        .toast {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(255, 255, 255, 0.95);
            color: #1a1226;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: bold;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            pointer-events: none;
            white-space: pre-line;
        }
        .toast.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }

        /* 版权与品牌群组 */
        .brand-footer {
            margin-top: 10px;
            font-size: 0.75rem;
            color: #6a5a6b;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
        }
        .brand-links { display: flex; gap: 15px; }
        .brand-links a {
            color: #89738b;
            text-decoration: none;
            transition: color 0.3s;
        }
        .brand-links a:hover { color: var(--secondary-pink); }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <div id="countdownOverlay"></div>

    <div class="text-container">
        <div id="captureArea">
            <div class="confession-text typing-cursor" id="confessionDisplay"></div>
        </div>
    </div>

    <div class="bottom-controls">
        
        <div class="color-panel" id="colorPanel">
            <div class="color-dot active" style="background:#ff758c;" onclick="changeColor(345, this)" title="浪漫樱粉"></div>
            <div class="color-dot" style="background:#00ffcc;" onclick="changeColor(165, this)" title="极光幻绿"></div>
            <div class="color-dot" style="background:#ffcc00;" onclick="changeColor(45, this)" title="璀璨纯金"></div>
            <div class="color-dot" style="background:#00bfff;" onclick="changeColor(195, this)" title="至臻莹蓝"></div>
            <div class="color-dot" style="background:#da70d6;" onclick="changeColor(300, this)" title="梦幻香芋紫"></div>
        </div>

        <div class="btn-group">
            <button class="btn" onclick="openModal('unlockModal')">✨ 定制/换一条</button>
            <button class="btn btn-secondary" onclick="copyShareLink()">🔗 快捷复制链接</button>
            <button class="btn btn-secondary" onclick="downloadCardImage()">下载当前卡片图</button>
        </div>

        <div class="share-grid">
            <div class="share-icon" onclick="shareToPlatform('微信')">微信</div>
            <div class="share-icon" onclick="shareToPlatform('微博')">微博</div>
            <div class="share-icon" onclick="shareToPlatform('抖音')">抖音</div>
            <div class="share-icon" onclick="shareToPlatform('小红书')">红书</div>
            <div class="share-icon" onclick="shareToPlatform('X')">X</div>
            <div class="share-icon" onclick="shareToPlatform('Facebook')">FB</div>
        </div>

        <div class="brand-footer">
            <div class="brand-links">
                <a href="https://mp.weixin.qq.com/s/n17RzI4ZL3-PPhcI30JouQ" target="_blank">关注公众号：艾兜兜儿</a>
                <a href="https://t.zsxq.com/FhQcu" target="_blank">🚀 知识星球</a>
            </div>
            <div>© 艾兜兜儿 创意工坊技术支持</div>
        </div>
    </div>

    <div class="popup-modal" id="unlockModal">
        <span class="close-popup" onclick="closeModal('unlockModal')">✕</span>
        <div class="popup-header">🔒 解锁高级自定义功能</div>
        <p class="hint-text">
            请点击一键复制微信号：<span class="wechat-wrapper" onclick="copyWeChat()">857023577 <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></span><br>回复“520”获取验证码，即可解锁自定义及随机无重复题库。
        </p>
        <input type="text" class="input-control" id="verifyCode" placeholder="请输入解锁验证码">
        <button class="btn" style="width: 100%;" onclick="verifyCode()">验证并解锁</button>
    </div>

    <div class="popup-modal" id="editModal">
        <span class="close-popup" onclick="closeModal('editModal')">✕</span>
        <div class="popup-header">💖 专属告白定制面板</div>
        <textarea class="input-control" id="customText" rows="3" placeholder="在这里写下想对Ta说的话..."></textarea>
        <div class="btn-group" style="margin-bottom: 0;">
            <button class="btn btn-secondary" style="flex: 1;" onclick="triggerRandomText()">🎲 随机换一条</button>
            <button class="btn" style="flex: 1;" onclick="applyCustomText()">确认生成文案</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 内置 JSON 表白文案库
        const textDatabase = [
            "浮世三千，吾爱有三。\n日、月与卿。\n日为朝，月为暮，卿为朝朝暮暮。",
            "晓看天色暮看云，\n行也思君，坐也思君。",
            "我曾踏过万里河山，\n可见过最美的风景，\n不过是你奔向我时的眉眼。",
            "听闻远方有你，动身跋涉千里。\n万里山河不如你，\n江河落日不及你。",
            "如果说这世间有无数巧合，\n那我能遇见你，\n便是其中最美妙的一篇诗章。",
            "你是落日弥漫的橘，\n天边透亮的星，\n是我生命里不可多得的温柔。"
        ];

        let remainingTexts = [...textDatabase]; 
        const CORRECT_CODE = "5201314";
        let isUnlocked = false;
        let currentTargetText = "";
        let globalHue = 345; // 默认粉红

        // 初始化
        window.onload = function() {
            initFireworks();
            const urlParams = new URLSearchParams(window.location.search);
            const sharedText = urlParams.get('text');
            
            if (sharedText) {
                startSequence(decodeURIComponent(sharedText));
            } else {
                startSequence(getRandomDataText()); 
            }
        }

        // 获取不重复文案逻辑
        function getRandomDataText() {
            if (remainingTexts.length === 0) remainingTexts = [...textDatabase];
            const randomIndex = Math.floor(Math.random() * remainingTexts.length);
            return remainingTexts.splice(randomIndex, 1)[0];
        }

        // 核心序列控制：倒计时 -> 烟花绽放 -> 打字机浮现
        function startSequence(targetText) {
            currentTargetText = targetText;
            document.getElementById('confessionDisplay').innerHTML = "";
            document.getElementById('confessionDisplay').classList.remove('typing-cursor');
            
            let count = 3;
            const overlay = document.getElementById('countdownOverlay');
            overlay.innerText = count;
            overlay.classList.add('active');

            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    overlay.innerText = count;
                } else if (count === 0) {
                    overlay.innerText = "❤";
                } else {
                    clearInterval(timer);
                    overlay.classList.remove('active');
                    // 1. 瞬间爆破核心指定高度公式烟花
                    fireCustomRocket();
                    // 2. 0.3秒后配合烟花散落，开启打字机效果
                    setTimeout(() => {
                        runTypewriter(currentTargetText);
                    }, 300);
                }
            }, 1000);
        }

        // 打字机逻辑
        function runTypewriter(text) {
            const display = document.getElementById('confessionDisplay');
            display.classList.add('typing-cursor');
            let index = 0;
            display.innerHTML = "";

            function type() {
                if (index < text.length) {
                    const char = text.charAt(index);
                    display.innerHTML += char === '\n' ? '<br>' : char;
                    index++;
                    setTimeout(type, 120); // 逐字呈现间隔时间
                } else {
                    display.classList.remove('typing-cursor');
                }
            }
            type();
        }

        // 随机换一条触发
        function triggerRandomText() {
            if (!isUnlocked) {
                showToast("请先输入验证码解锁该功能哦！");
                return;
            }
            closeModal('editModal');
            startSequence(getRandomDataText());
        }

        // 换烟花颜色
        function changeColor(hue, element) {
            globalHue = hue;
            document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
            element.classList.add('active');
            // 修改视觉主色
            document.documentElement.style.setProperty('--primary-pink', `hsl(${hue}, 100%, 70%)`);
            document.documentElement.style.setProperty('--secondary-pink', `hsl(${hue}, 100%, 60%)`);
            // 实时打一发新颜色的烟花
            fireCustomRocket();
        }

        // 各大渠道分享桥接路由器
        function shareToPlatform(platform) {
            const currentText = document.getElementById('confessionDisplay').innerText;
            const encodedText = encodeURIComponent(currentText);
            const shareUrl = `${window.location.origin}${window.location.pathname}?text=${encodedText}`;
            
            // 执行自动复制到剪贴板，方便跨应用跳转粘贴
            navigator.clipboard.writeText(shareUrl).then(() => {
                let msg = "";
                switch(platform) {
                    case '微信': msg = "🔗 表白链接已打包复制！\n可直接切换至微信粘贴发送给心爱的Ta或发朋友圈。"; break;
                    case '微博': msg = "🔗 分享链接已备好！\n即将为您复制。建议发微博配词：#520浪漫表白# [粘贴链接]"; break;
                    case '抖音': case '小红书': msg = "🔗 专属定制指引已生成并复制！\n配合下方“下载当前卡片图”功能，发图文/视频挂载传播更出圈哦。"; break;
                    default: msg = `🔗 专属链接已成功复制！\n快去分享到 ${platform} 平台吧~`;
                }
                showToast(msg);
            }).catch(() => {
                showToast("链接打包成功，请直接复制当前浏览器上方地址栏进行分享~");
            });
        }

        // 弹窗辅助
        function openModal(id) {
            if (id === 'unlockModal' && isUnlocked) id = 'editModal';
            document.getElementById(id).style.display = 'block';
            setTimeout(() => document.getElementById(id).classList.add('show'), 10);
        }
        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
            setTimeout(() => document.getElementById(id).style.display = 'none', 400);
        }
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // 微信号带图标复制
        function copyWeChat() {
            const wechatId = "857023577";
            navigator.clipboard.writeText(wechatId).then(() => {
                showToast(`📋 微信号 ${wechatId} 已秒速复制！\n正在打开微信... (提示将在3秒后关闭)`);
            }).catch(() => {
                showToast(`长按复制微信号: ${wechatId}`);
            });
        }

        // 解锁检验
        function verifyCode() {
            const code = document.getElementById('verifyCode').value.trim();
            if (code === CORRECT_CODE) {
                isUnlocked = true;
                showToast("🎉 恭喜解锁高级权益！\n已为您开启自定义定制与随机无重复题库。");
                closeModal('unlockModal');
                setTimeout(() => {
                    openModal('editModal');
                    document.getElementById('customText').value = currentTargetText;
                }, 500);
            } else {
                showToast("验证码有误，添加作者微信号免费索取哦~");
            }
        }

        // 应用自定义文本
        function applyCustomText() {
            const text = document.getElementById('customText').value.trim();
            if(!text) { showToast("深情不能留白，写点什么吧~"); return; }
            closeModal('editModal');
            startSequence(text);
        }

        // 复制链接
        function copyShareLink() {
            shareToPlatform('通用');
        }

        // 截图合成卡片图下载
        function downloadCardImage() {
            showToast("📸 正在渲染高清卡片图像，请稍候...");
            const target = document.getElementById('captureArea');
            
            // 截图期间动态补足梦幻星空纯色背景，防止透明漏底
            target.style.background = "linear-gradient(135deg, #120b24 0%, #080411 100%)";
            target.style.border = "1px solid rgba(255,117,140,0.3)";
            
            html2canvas(target, {
                backgroundColor: null,
                useCORS: true,
                scale: 2
            }).then(canvas => {
                // 截完图后恢复无缝透明夜空样式
                target.style.background = "transparent";
                target.style.border = "none";

                const imgData = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `520表白卡片-${new Date().getTime()}.png`;
                link.href = imgData;
                link.click();
                showToast("📸 渲染成功！已拉起保存/下载流程。");
            }).catch(() => {
                target.style.background = "transparent";
                target.style.border = "none";
                showToast("由于跨平台权限，建议直接长按屏幕或手机截图保存。");
            });
        }


        // ================= 动态公式烟花渲染引擎 =================
        const cvs = document.getElementById('fireworksCanvas');
        const ctx = cvs.getContext('2d');
        let rockets = [], particles = [];

        function resize() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; }
        window.addEventListener('resize', resize);

        function initFireworks() { resize(); animLoop(); }

        function getPoints(cx, cy, scale) {
            const pts = [];
            function heart(ox, oy, sc) {
                for (let a = 0; a < Math.PI * 2; a += 0.06) {
                    const x = 16 * Math.pow(Math.sin(a), 3);
                    const y = -(13 * Math.cos(a) - 5 * Math.cos(2*a) - 2 * Math.cos(3*a) - Math.cos(4*a));
                    pts.push({ x: cx + x * sc + ox, y: cy + y * sc + oy });
                }
            }
            function text(txt, ox, oy, sz) {
                const b = document.createElement('canvas'); b.width = 160; b.height = 100;
                const c = b.getContext('2d'); c.font = `bold ${sz}px Arial`; c.fillStyle = 'white';
                c.fillText(txt, 10, 60);
                const data = c.getImageData(0,0,160,100).data;
                for(let y=0; y<100; y+=4) {
                    for(let x=0; x<160; x+=4) {
                        if(data[(y*160+x)*4+3] > 128) pts.push({ x: cx + x + ox - 50, y: cy + y + oy - 50 });
                    }
                }
            }
            const gap = scale * 22;
            heart(-gap, -10, scale); text("+", -gap * 0.35, -25, 32);
            heart(0, -10, scale); text("=", gap * 0.45, -25, 32);
            heart(gap, -10, scale); text("2", gap * 1.35, -45, 20);
            return pts;
        }

        class Rocket {
            constructor() {
                this.x = cvs.width / 2;
                this.y = cvs.height;
                this.tx = cvs.width / 2;
                this.ty = cvs.height * 0.28; // 公式在上方28%黄金视区炸开
                this.speed = 6.5;
                this.angle = Math.atan2(this.ty - this.y, this.tx - this.x);
                this.hue = globalHue;
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                if (Math.abs(this.y - this.ty) < 8) {
                    explode(this.tx, this.ty, this.hue);
                    return false;
                }
                return true;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, 75%)`; ctx.fill();
            }
        }

        class Part {
            constructor(x, y, tx, ty, hue) {
                this.x = x; this.y = y; this.alpha = 1;
                this.vx = (tx - x) * (0.04 + Math.random() * 0.02);
                this.vy = (ty - y) * (0.04 + Math.random() * 0.02);
                this.life = 150 + Math.random() * 40;
                this.hue = hue; this.stage = 1;
            }
            update() {
                if(this.stage === 1) {
                    this.x += this.vx; this.y += this.vy; this.life--;
                    if(this.life <= 50) {
                        this.stage = 2;
                        this.vx = (Math.random() - 0.5) * 1.6;
                        this.vy = Math.random() * 1.3 + 0.4;
                    }
                } else {
                    this.x += this.vx; this.y += this.vy; this.alpha -= 0.012;
                }
                return this.alpha > 0;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.beginPath(); ctx.arc(this.x, this.y, Math.random() * 2 + 1, 0, Math.PI*2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, ${75 + Math.random()*20}%)`;
                ctx.shadowBlur = 6; ctx.shadowColor = `hsl(${this.hue}, 100%, 70%)`;
                ctx.fill(); ctx.restore();
            }
        }

        function explode(cx, cy, hue) {
            const sc = cvs.width < 500 ? 4.5 : 7.5;
            getPoints(cx, cy, sc).forEach(p => particles.push(new Part(cx, cy, p.x, p.y, hue)));
        }

        function fireCustomRocket() { rockets.push(new Rocket()); }

        function animLoop() {
            ctx.fillStyle = 'rgba(6, 3, 12, 0.24)'; ctx.fillRect(0, 0, cvs.width, cvs.height);
            rockets = rockets.filter(r => { r.update(); r.draw(); return r.y > r.ty; });
            particles = particles.filter(p => { const a = p.update(); p.draw(); return a; });
            requestAnimationFrame(animLoop);
        }
    </script>
</body>
</html>
